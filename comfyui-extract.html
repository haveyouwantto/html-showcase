<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>ComfyUI Professional Metadata Inspector</title>
    <style>
        :root {
            --bg: #1e1e1e;
            --text: #d4d4d4;
            --key: #9cdcfe;
            --str: #ce9178;
            --num: #b5cea8;
            --bool: #569cd6;
            --border: #333;
            --hover: #2d2d2d;
            --line-num: #858585;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212;
            color: #eee;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        #drop-zone {
            border: 2px dashed #444;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: #1a1a1a;
            margin-bottom: 20px;
        }

        #drop-zone:hover {
            border-color: #007acc;
            background: #252526;
        }

        .main-layout {
            display: grid;
            grid-template-columns: minmax(300px, 1fr) 2fr;
            gap: 20px;
            margin-top: 20px;
        }

        #preview-container {
            background: #1a1a1a;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 20px;
            max-height: calc(100vh - 40px);
            overflow: auto;
        }

        #preview-img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            display: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        /* JSON 代码区域样式 */
        .viewer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #333;
            padding: 8px 15px;
            border-radius: 8px 8px 0 0;
            font-size: 13px;
        }

        .header-btns {
            display: flex;
            gap: 8px;
        }

        .header-btns button {
            background: #444;
            color: #ccc;
            border: 1px solid #555;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }

        .header-btns button:hover {
            background: #555;
            color: #fff;
        }

        #json-container {
            background: var(--bg);
            color: var(--text);
            padding: 10px 0;
            border-radius: 0 0 8px 8px;
            font-family: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.6;
            overflow-x: auto;
            border: 1px solid var(--border);
            position: relative;
        }

        /* 语法高亮 */
        .json-key {
            color: var(--key);
            cursor: pointer;
        }

        .json-key:hover {
            text-decoration: underline;
        }

        .json-string {
            color: var(--str);
            cursor: pointer;
        }

        .json-number {
            color: var(--num);
            cursor: pointer;
        }

        .json-boolean {
            color: var(--bool);
            cursor: pointer;
        }

        .ln-wrap {
            display: flex;
            white-space: pre;
        }

        .ln-wrap:hover {
            background: var(--hover);
        }

        .line-num {
            color: var(--line-num);
            text-align: right;
            padding-right: 15px;
            padding-left: 10px;
            user-select: none;
            min-width: 40px;
            border-right: 1px solid #3c3c3c;
            margin-right: 10px;
        }

        .collapsible {
            cursor: pointer;
            user-select: none;
            display: inline-flex;
            align-items: center;
        }

        .collapsible::before {
            content: '▼';
            display: inline-block;
            margin-right: 5px;
            font-size: 10px;
            transition: transform 0.2s;
            color: #888;
        }

        .collapsed::before {
            transform: rotate(-90deg);
        }

        .collapsed+.json-content {
            display: none;
        }

        .collapsed-summary {
            display: none;
            color: #666;
            font-size: 11px;
            margin-left: 5px;
        }

        .collapsed .collapsed-summary {
            display: inline;
        }

        /* 交互反馈 */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #007acc;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            display: none;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .controls {
            margin-top: 10px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>🛠️ ComfyUI Metadata Inspector</h2>
        <div id="drop-zone">将 ComfyUI 生成图拖入此处解析二进制 Metadata</div>

        <div id="viewer-section" style="display:none">
            <div class="main-layout">
                <div id="preview-container">
                    <p style="margin-top: 0; font-size: 13px; color: #888; font-weight: bold;">PREVIEW</p>
                    <img id="preview-img" src="" alt="Preview">
                </div>

                <div class="json-panel">
                    <div class="viewer-header">
                        <span id="file-info">File: unknown.png</span>
                        <div class="header-btns">
                            <button onclick="expandAll()">全部展开</button>
                            <button onclick="collapseAll()">全部收起</button>
                            <button onclick="copyFull()">复制全部 JSON</button>
                        </div>
                    </div>
                    <div id="json-container"></div>
                    <div class="controls">
                        💡 技巧：点击 <b>键名</b> 复制路径，点击 <b>数值</b> 复制值。
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">已复制到剪贴板</div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const jsonContainer = document.getElementById('json-container');
        const previewImg = document.getElementById('preview-img');
        const toast = document.getElementById('toast');
        let currentLine = 1;

        dropZone.ondragover = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; };
        dropZone.ondrop = (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); };
        dropZone.onclick = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = _ => handleFile(input.files[0]);
            input.click();
        };

        function handleFile(file) {
            if (!file || !file.name.endsWith('.png')) return alert('请上传 PNG 文件');
            document.getElementById('file-info').textContent = `File: ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;

            const reader = new FileReader();
            reader.onload = (e) => {
                const buffer = e.target.result;
                const promptStr = extractMetadata(buffer);

                // Set image preview
                const blob = new Blob([buffer], { type: 'image/png' });
                const url = URL.createObjectURL(blob);
                previewImg.src = url;
                previewImg.style.display = 'inline-block';

                if (promptStr) {
                    try {
                        renderJSON(JSON.parse(promptStr));
                        document.getElementById('viewer-section').style.display = 'block';
                    } catch (err) {
                        alert('JSON 解析失败: ' + err.message);
                    }
                } else {
                    alert('未检测到 ComfyUI 埋入的 prompt 信息。');
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function extractMetadata(buffer) {
            const view = new DataView(buffer);
            let pos = 8;
            while (pos < buffer.byteLength) {
                if (pos + 8 > buffer.byteLength) break;
                const length = view.getUint32(pos);
                const type = String.fromCharCode(...new Uint8Array(buffer, pos + 4, 4));
                if (type === 'tEXt') {
                    const data = new Uint8Array(buffer, pos + 8, length);
                    const text = new TextDecoder().decode(data);
                    if (text.startsWith('prompt\0')) return text.split('\0')[1];
                }
                pos += length + 12;
                if (type === 'IEND') break;
            }
            return null;
        }

        function renderJSON(obj) {
            jsonContainer.innerHTML = '';
            currentLine = 1;
            jsonContainer.innerHTML = formatNodes(obj, "");
            attachToggles();
        }

        function buildLine(content, indent = 0) {
            const spaces = "  ".repeat(indent);
            const line = `<div class="ln-wrap"><div class="line-num">${currentLine++}</div><div class="line-content">${spaces}${content}</div></div>`;
            return line;
        }

        function formatNodes(obj, path) {
            let html = "";
            const isArray = Array.isArray(obj);
            const openBrace = isArray ? "[" : "{";
            const closeBrace = isArray ? "]" : "}";

            const keys = Object.keys(obj);
            const indentLevel = path === "" ? 0 : (path.match(/\[/g) || []).length;

            if (keys.length === 0) {
                return buildLine(openBrace + closeBrace, indentLevel);
            }

            // Start of object/array
            html += `<div class="ln-wrap"><div class="line-num">${currentLine++}</div><div class="line-content">` +
                "  ".repeat(indentLevel) +
                `<span class="collapsible">${openBrace}<span class="collapsed-summary">... ${keys.length} items ...</span></span></div></div>` +
                `<div class="json-content">`;

            keys.forEach((key, index) => {
                const val = obj[key];
                const currentPath = `${path}['${key}']`;
                const isLast = index === keys.length - 1;
                const comma = isLast ? "" : ",";

                if (typeof val === 'object' && val !== null) {
                    html += `<div class="ln-wrap"><div class="line-num">${currentLine++}</div><div class="line-content">` +
                        "  ".repeat(indentLevel + 1) +
                        `<span class="json-key" onclick="copyText('${currentPath.replace(/'/g, "\\'")}')">"${key}"</span>: </div></div>`;
                    html += formatNodes(val, currentPath);
                    if (!isLast) {
                        html = html.replace(/<\/div><\/div>$/, ",</div></div>");
                    }
                } else {
                    const type = typeof val;
                    const displayVal = type === 'string' ? `"${val}"` : val;
                    const copyVal = String(val).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
                    html += buildLine(`<span class="json-key" onclick="copyText('${currentPath.replace(/'/g, "\\'")}')">"${key}"</span>: <span class="json-${type}" onclick="copyText('${copyVal}')">${displayVal}</span>${comma}`, indentLevel + 1);
                }
            });

            html += `</div>`;
            html += buildLine(closeBrace, indentLevel);
            return html;
        }

        function attachToggles() {
            document.querySelectorAll('.collapsible').forEach(el => {
                el.onclick = function () {
                    this.classList.toggle('collapsed');
                };
            });
        }

        window.expandAll = () => {
            document.querySelectorAll('.collapsible').forEach(el => el.classList.remove('collapsed'));
        };

        window.collapseAll = () => {
            document.querySelectorAll('.collapsible').forEach(el => el.classList.add('collapsed'));
        };

        window.copyText = (text) => {
            navigator.clipboard.writeText(text);
            toast.style.display = 'block';
            toast.textContent = `已复制: ${text.length > 40 ? text.substring(0, 40) + '...' : text}`;
            setTimeout(() => toast.style.display = 'none', 1500);
        };

        window.copyFull = () => {
            const rawText = Array.from(document.querySelectorAll('.ln-wrap'))
                .map(el => el.querySelector('.line-content').innerText)
                .join('\n');
            navigator.clipboard.writeText(rawText);
            copyText('完整 JSON');
        };
    </script>
</body>

</html>
