<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudflare Location Detect</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.8);
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --cf-orange: #f78166;
            --border-color: #30363d;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 20% 20%, rgba(88, 166, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(247, 129, 102, 0.05) 0%, transparent 40%);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            padding: 2.5rem;
            border-radius: 1.25rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            max-width: 440px;
            width: 90%;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0 0 2rem 0;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        header h1 svg {
            color: var(--cf-orange);
        }

        .data-point {
            margin-bottom: 1.5rem;
        }

        .label {
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        .value {
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.05em;
        }

        .location-info {
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
            min-height: 3rem;
        }

        .city-name {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .status {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }

        .redetect-btn {
            margin-top: 1.25rem;
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.5rem 1.2rem;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 0.6rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-family: inherit;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
        }

        .redetect-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(88, 166, 255, 0.07);
        }

        .redetect-btn:active {
            transform: scale(0.96);
        }

        .redetect-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .redetect-btn svg {
            transition: transform 0.5s ease;
        }

        .redetect-btn.spinning svg {
            animation: spin 0.8s linear infinite;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            transition: all 0.3s ease;
            position: relative;
        }

        .dot.success {
            background-color: #238636;
            box-shadow: 0 0 10px #238636;
            animation: pulse 2s infinite;
        }

        .dot.error {
            background-color: #da3633;
            box-shadow: 0 0 10px #da3633;
        }

        .dot.requesting {
            width: 12px;
            height: 12px;
            background: transparent;
            border: 2px solid rgba(88, 166, 255, 0.2);
            border-top-color: var(--accent);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(35, 134, 54, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(35, 134, 54, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(35, 134, 54, 0);
            }
        }

        .loading .value,
        .loading .city-name {
            color: var(--border-color);
            background: linear-gradient(90deg, var(--border-color) 25%, #444 50%, var(--border-color) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes loading {
            from {
                background-position: 200% 0;
            }

            to {
                background-position: -200% 0;
            }
        }

        .ip-info {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
            display: none;
            flex-direction: column;
            gap: 1rem;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .ip-info.visible {
            display: flex;
        }

        .ip-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .ip-row .label {
            margin-bottom: 0;
            text-align: left;
            white-space: nowrap;
        }

        .ip-value {
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.03em;
            text-align: right;
            overflow-wrap: anywhere;
        }

        .country-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            background: rgba(88, 166, 255, 0.08);
            border: 1px solid rgba(88, 166, 255, 0.2);
            border-radius: 0.5rem;
            padding: 0.2rem 0.6rem;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--accent);
        }

        .country-flag {
            font-size: 1.2rem;
            line-height: 1;
        }

        .ip-value-wrap {
            display: flex;
            align-items: center;
            gap: 0.45rem;
        }

        .ip-toggle-btn {
            background: none;
            border: none;
            padding: 0.15rem;
            cursor: pointer;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            border-radius: 0.3rem;
            transition: color 0.2s, background 0.2s;
            flex-shrink: 0;
        }

        .ip-toggle-btn:hover {
            color: var(--accent);
            background: rgba(88, 166, 255, 0.1);
        }

        .ip-value.masked {
            color: var(--text-secondary);
        }
    </style>
</head>

    <div class="container" id="app">
        <header>
            <h1>

                        stroke-width="2" />
                </svg>
                Cloudflare Detector
            </h1>
        </header>

        <div class="data-point loading" id="detection-content">
            <div class="label">Colocation Code</div>
            <div class="value" id="code-display">---</div>
        </div>

        <div class="location-info loading" id="location-content">
            <div class="label">Physical Location</div>
            <div class="city-name" id="city-display">Determining...</div>
        </div>

        <div class="ip-info" id="ip-info">
            <div class="ip-row">
                <div class="label">Your IP Address</div>
                <div class="ip-value-wrap">
                    <div class="ip-value" id="ip-display">—</div>
                    <button class="ip-toggle-btn" id="ip-toggle-btn" title="Toggle IP visibility" aria-label="Toggle IP visibility">
                        <!-- eye icon (visible state) -->
                        <svg id="icon-eye" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <!-- eye-off icon (hidden state) -->
                        <svg id="icon-eye-off" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="ip-row">
                <div class="label">Geolocation</div>
                <div class="country-badge" id="country-display">
                    <span class="country-flag" id="country-flag"></span>
                    <span id="country-code">—</span>
                </div>
            </div>
        </div>

        <div class="status">
            <div class="dot requesting" id="status-dot"></div>
            <span id="status-text">Network Status: Requesting...</span>
        </div>
        <button class="redetect-btn spinning" id="redetect-btn" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10" />
                <polyline points="1 20 1 14 7 14" />
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
            </svg>
            Re-detect
        </button>
    </div>

        const codeDisplay = document.getElementById('code-display');
        const cityDisplay = document.getElementById('city-display');
        const detectionContent = document.getElementById('detection-content');
        const locationContent = document.getElementById('location-content');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const redetectBtn = document.getElementById('redetect-btn');

        const ipInfo = document.getElementById('ip-info');
        const ipDisplay = document.getElementById('ip-display');
        const countryFlag = document.getElementById('country-flag');
        const countryCode = document.getElementById('country-code');
        const ipToggleBtn = document.getElementById('ip-toggle-btn');
        const iconEye = document.getElementById('icon-eye');
        const iconEyeOff = document.getElementById('icon-eye-off');

        let ipHidden = false;
        let realIp = '';

        function maskIp(ip) {
            // Replace every digit with a bullet, preserve dots and colons for structure
            return ip.replace(/[0-9a-fA-F]/g, '•');
        }

        ipToggleBtn.addEventListener('click', () => {
            ipHidden = !ipHidden;
            ipDisplay.innerText = ipHidden ? maskIp(realIp) : realIp;
            ipDisplay.classList.toggle('masked', ipHidden);
            iconEye.style.display = ipHidden ? 'none' : '';
            iconEyeOff.style.display = ipHidden ? '' : 'none';
            ipToggleBtn.title = ipHidden ? 'Show IP' : 'Hide IP';
        });

        function countryCodeToFlag(cc) {
            // Convert ISO 3166-1 alpha-2 country code to emoji flag
            if (!cc || cc.length !== 2) return '';
            return [...cc.toUpperCase()].map(c => String.fromCodePoint(0x1F1E6 - 65 + c.charCodeAt(0))).join('');
        }

        function detect() {
            // Reset to loading state
            detectionContent.classList.add('loading');
            locationContent.classList.add('loading');
            codeDisplay.innerText = '---';
            cityDisplay.innerText = 'Determining...';
            ipInfo.classList.remove('visible');
            ipDisplay.innerText = '—';
            ipDisplay.classList.remove('masked');
            iconEye.style.display = '';
            iconEyeOff.style.display = 'none';
            ipHidden = false;
            realIp = '';
            countryFlag.textContent = '';
            countryCode.textContent = '—';
            statusDot.className = 'dot requesting';
            statusText.innerText = 'Network Status: Requesting...';
            redetectBtn.disabled = true;
            redetectBtn.classList.add('spinning');

            fetch('https://api.maple-kaede.eu.org/?https://httpbin.org/get')
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.json();
                })
                .then(data => {
                    const cfRay = data['headers']['Cf-Ray'];
                    if (cfRay) {
                        const loc = cfRay.split('-')[1];

                        // Remove loading states
                        detectionContent.classList.remove('loading');
                        locationContent.classList.remove('loading');

                        codeDisplay.innerText = loc;
                        cityDisplay.innerText = CFlocationMap[loc] || 'Unknown Location (' + loc + ')';

                        // Populate IP info
                        const ip = data['headers']['Cf-Connecting-Ip'] || data['headers']['Cf-Connecting-Ip'.toLowerCase()] || '—';
                        const cc = data['headers']['Cf-Ipcountry'] || data['headers']['Cf-Ipcountry'.toLowerCase()] || '';
                        realIp = ip;
                        ipDisplay.innerText = ip;
                        countryCode.textContent = cc || '—';
                        countryFlag.textContent = countryCodeToFlag(cc);
                        ipInfo.classList.add('visible');

                        // Update status to success
                        statusDot.className = 'dot success';
                        statusText.innerText = 'Network Status: Optimal';
                    } else {
                        throw new Error('Cf-Ray header missing');
                    }
                })
                .catch(err => {
                    console.error('Detection failed:', err);
                    cityDisplay.innerText = 'Detection failed';
                    detectionContent.classList.remove('loading');
                    locationContent.classList.remove('loading');

                    // Update status to error
                    statusDot.className = 'dot error';
                    statusText.innerText = 'Network Status: Failed';
                })
                .finally(() => {
                    redetectBtn.disabled = false;
                    redetectBtn.classList.remove('spinning');
                });
        }

        redetectBtn.addEventListener('click', detect);
        detect();
    </script>
