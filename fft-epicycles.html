<!DOCTYPE html>
<html>

<head>
    <title>FFT Epicycles</title>
    <!-- <script src="https://cdn.jsdelivr.net/npm/opentype.js/dist/opentype.min.js"></script> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Compact Floating Toolbar */
        .toolbar {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            z-index: 1000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .toolbar-main {
            display: flex;
            flex-direction: row;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 5px;
            gap: 5px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toolbar.collapsed .toolbar-main {
            overflow: hidden;
            padding: 5px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            min-width: 40px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: background 0.2s, transform 0.1s;
            position: relative;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .icon-btn:active {
            transform: scale(0.9);
        }

        .icon-btn.active {
            background: rgba(76, 201, 240, 0.4);
            box-shadow: 0 0 8px rgba(76, 201, 240, 0.6);
        }

        /* Pop-up Controls */
        .popover {
            position: absolute;
            bottom: 60px;
            right: 0;
            background: rgba(20, 20, 25, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            display: none;
            flex-direction: column;
            gap: 8px;
            min-width: 180px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            z-index: 1100;
        }

        .popover.active {
            display: flex;
        }

        .popover .label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 4px;
        }

        .popover .val-text {
            color: #4cc9f0;
            font-weight: bold;
            font-size: 12px;
        }

        /* Custom Form Styling */
        .popover input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: transparent;
            margin: 12px 0;
            cursor: pointer;
        }

        .popover input[type="range"]:focus {
            outline: none;
        }

        /* Track */
        .popover input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            transition: background 0.2s;
        }

        .popover input[type="range"]:hover::-webkit-slider-runnable-track {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Thumb */
        .popover input[type="range"]::-webkit-slider-thumb {
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #4cc9f0;
            -webkit-appearance: none;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(76, 201, 240, 0.5);
            transition: transform 0.1s;
        }

        .popover input[type="range"]:active::-webkit-slider-thumb {
            transform: scale(1.2);
        }

        /* Firefox Support */
        .popover input[type="range"]::-moz-range-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        .popover input[type="range"]::-moz-range-thumb {
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #4cc9f0;
            border: none;
            box-shadow: 0 0 10px rgba(76, 201, 240, 0.5);
        }

        .popover input[type="text"],
        .popover select {
            width: 100%;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            color: #fff;
            padding: 6px 12px;
            font-family: inherit;
            font-size: 13px;
            outline: none;
            transition: all 0.2s;
        }

        .popover input[type="text"]:focus,
        .popover select:focus {
            border-color: #4cc9f0;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 8px rgba(76, 201, 240, 0.2);
        }

        .popover select option {
            background: #141419;
            color: #fff;
        }

        .popover .action-btn {
            width: 100%;
            border: none;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.2s;
            background: #4cc9f0;
            color: #000;
            margin-top: 8px;
        }

        .popover .action-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(76, 201, 240, 0.3);
        }

        .popover .action-btn:active {
            transform: translateY(0);
        }

        /* Hide elements when collapsed */
        .toolbar.collapsed .hidden-on-collapse {
            display: none;
        }

        .hidden-on-collapse {
            display: flex;
            flex-direction: row;
            gap: 5px;
            max-height: 60vh;
            overflow-y: auto;
            border-right: 1px solid gray;
        }

        /* Responsive vertical toolbar for narrow screens */
        @media (max-width: 600px) {
            .toolbar-main {
                flex-direction: column;
                border-radius: 25px;
            }

            .hidden-on-collapse {
                flex-direction: column;
                border-right: none;
                border-bottom: 1px solid gray;
            }

            .popover {
                bottom: 15px;
                right: 60px;
            }
        }

        #minimap {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 150px;
            height: 150px;
            background: rgba(20, 20, 25, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            z-index: 1000;
            pointer-events: none;
            display: block;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>
    <canvas id="minimap"></canvas>

    <div class="toolbar" id="mainToolbar">
        <div class="toolbar-main">
            <div class="hidden-on-collapse">
                <!-- Speed -->
                <button class="icon-btn" id="speedBtn" title="Speed">⏱️</button>
                <div class="popover" id="speedPopover">
                    <span class="label">Speed: <span id="speedVal" class="val-text">0.0002</span></span>
                    <input type="range" id="speedRange" min="0" max="1" step="0.0001">
                </div>

                <!-- Harmonics -->
                <button class="icon-btn" id="harmonicsBtn" title="Harmonics">📶</button>
                <div class="popover" id="harmonicsPopover">
                    <span class="label">Harmonics: <span id="harmonicsVal" class="val-text">128</span></span>
                    <input type="range" id="harmonicsRange" min="0" max="1" step="0.001">
                </div>

                <!-- Show/Hide Circles -->
                <button class="icon-btn active" id="circlesToggleBtn" title="Toggle Epicycles (Circles)">⭕</button>

                <!-- Show/Hide Vectors -->
                <button class="icon-btn active" id="vectorsToggleBtn" title="Toggle Vectors (Lines)">↗️</button>

                <!-- Minimap -->
                <button class="icon-btn active" id="mapToggleBtn" title="Toggle Minimap">🗺️</button>

                <!-- Presets -->
                <button class="icon-btn" id="presetsBtn" title="Presets">🎁</button>
                <div class="popover" id="presetsPopover">
                    <span class="label">Choose Preset</span>
                    <select id="presetSelect">
                        <option value="square">Square</option>
                        <option value="triangle">Triangle</option>
                        <option value="pentagon">Pentagon</option>
                        <option value="pentagram">Pentagram</option>
                        <option value="circle">Circle</option>
                        <option value="infinity">Infinity</option>
                        <option value="butterfly">Butterfly</option>
                    </select>
                </div>

                <!-- Pen -->
                <button class="icon-btn" id="penBtn" title="Draw Path">✏️</button>

                <!-- SVG / Image -->
                <button class="icon-btn" id="svgBtn" title="Import SVG or Image">🖼️</button>
                <input type="file" id="svgInput" accept=".svg, image/*" style="display:none">

                <!-- Text -->
                <button class="icon-btn" id="textBtnIcon" title="Text to Path">🔤</button>
                <div class="popover" id="textPopover">
                    <span class="label">Render Text</span>
                    <input type="text" id="textInput" placeholder="Enter text...">
                    <button id="textBtnRender" class="action-btn">Build</button>
                </div>

                <!-- Follow -->
                <button class="icon-btn" id="followBtn" title="Camera Follow">🎯</button>
                <input type="checkbox" id="followCheck" style="display:none">
            </div>

            <!-- Toggle -->
            <button class="icon-btn" id="toggleBar" title="Toggle Toolbar">🛠️</button>
        </div>
    </div>
    <script>
        /** @type {HTMLCanvasElement} */
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        /** @type {HTMLCanvasElement} */
        const minimap = document.getElementById('minimap');
        const minictx = minimap.getContext('2d');

        const MIN_VISIBLE_SIZE = 1;

        class RenderingContext {
            constructor(canvas, ctx) {
                this.canvas = canvas;
                this.ctx = ctx;
                this.width = window.innerWidth;
                this.height = window.innerHeight;
                this.updateScale();
                this.objects = [];

                // Camera State
                this.camX = 0;
                this.camY = 0;
                this.zoom = 1.0;

                this.targetCamX = 0;
                this.targetCamY = 0;
                this.targetZoom = 1.0;

                this.lerpFactor = 0.15; // Smoothness factor

                // Interaction state
                this.isDragging = false;
                this.lastMouseX = 0;
                this.lastMouseY = 0;

                // Colors - Premium Dark Mode Palette
                this.colors = {
                    background: '#0a0a0c',
                    grid: '#1e1e24',
                    axis: '#3a3a45',
                    primary: '#4cc9f0',   // Cyan
                    secondary: '#f72585', // Pink
                    accent: '#7209b7',    // Purple
                    text: '#e0e0e6',
                    vector: '#4cc9f0c0',
                    circles: "#ffffff40",
                    path: "#ffff0080"
                };
            }

            updateScale() {
                // Unit circle (radius 1) occupies about half the smaller screen dimension
                // Diameter 2 = 0.5 * minDim => scale = minDim / 4
                this.scale = Math.min(this.width, this.height) / 4;
            }

            resize() {
                this.width = window.innerWidth;
                this.height = window.innerHeight;
                this.updateScale();
                this.canvas.width = this.width * window.devicePixelRatio;
                this.canvas.height = this.height * window.devicePixelRatio;
                this.ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

                minimap.width = 150 * window.devicePixelRatio;
                minimap.height = 150 * window.devicePixelRatio;
                minictx.setTransform(1, 0, 0, 1, 0, 0); // reset before scale
                minictx.scale(window.devicePixelRatio, window.devicePixelRatio);
            }

            toScreen(x, y) {
                const s = this.scale * this.zoom;
                return {
                    x: this.width / 2 + (x - this.camX) * s,
                    y: this.height / 2 - (y - this.camY) * s
                };
            }

            toWorld(sx, sy) {
                const s = this.scale * this.zoom;
                return {
                    x: (sx - this.width / 2) / s + this.camX,
                    y: -(sy - this.height / 2) / s + this.camY
                };
            }

            handleInput() {
                this.canvas.addEventListener('mousedown', (e) => {
                    if (state.mode === 'draw') {
                        state.penPoints = [];
                        const worldPos = this.toWorld(e.clientX, e.clientY);
                        state.penPoints.push(worldPos);
                        state.isDrawingMode = true;
                    } else {
                        this.isDragging = true;
                        this.lastMouseX = e.clientX;
                        this.lastMouseY = e.clientY;
                    }
                });

                window.addEventListener('mousemove', (e) => {
                    if (state.mode === 'draw' && state.isDrawingMode) {
                        const worldPos = this.toWorld(e.clientX, e.clientY);
                        state.penPoints.push(worldPos);
                    } else if (this.isDragging) {
                        const dx = e.clientX - this.lastMouseX;
                        const dy = e.clientY - this.lastMouseY;

                        const s = this.scale * this.zoom;
                        this.targetCamX -= dx / s;
                        this.targetCamY += dy / s;

                        this.lastMouseX = e.clientX;
                        this.lastMouseY = e.clientY;
                    }
                });

                window.addEventListener('mouseup', () => {
                    this.isDragging = false;
                    if (state.mode === 'draw' && state.isDrawingMode) {
                        state.isDrawingMode = false;
                    }
                });

                this.canvas.addEventListener('wheel', (e) => {
                    e.preventDefault();

                    const zoomSensitivity = 0.001;
                    const factor = Math.exp(-e.deltaY * zoomSensitivity);

                    const mouseW = this.toWorld(e.clientX, e.clientY);

                    this.targetZoom *= factor;
                    this.targetZoom = Math.min(Math.max(this.targetZoom, 0.1), 1e5);

                    // After zooming, we adjust target position to keep point under mouse stationary
                    const s_new = this.scale * this.targetZoom;
                    this.targetCamX = mouseW.x - (e.clientX - this.width / 2) / s_new;
                    this.targetCamY = mouseW.y + (e.clientY - this.height / 2) / s_new;

                }, { passive: false });

                // Touch Events
                this.canvas.addEventListener('touchstart', (e) => {
                    if (e.touches.length === 1) {
                        const touch = e.touches[0];
                        if (state.mode === 'draw') {
                            e.preventDefault();
                            state.penPoints = [];
                            const worldPos = this.toWorld(touch.clientX, touch.clientY);
                            state.penPoints.push(worldPos);
                            state.isDrawingMode = true;
                        } else {
                            this.isDragging = true;
                            this.lastMouseX = touch.clientX;
                            this.lastMouseY = touch.clientY;
                        }
                    } else if (e.touches.length === 2 && state.mode !== 'draw') {
                        e.preventDefault();
                        this.isDragging = false;
                        const dx = e.touches[0].clientX - e.touches[1].clientX;
                        const dy = e.touches[0].clientY - e.touches[1].clientY;
                        this.initialPinchDistance = Math.hypot(dx, dy);
                        this.initialPinchZoom = this.targetZoom;

                        const centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                        const centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                        this.initialPinchCenterWorld = this.toWorld(centerX, centerY);
                    }
                }, { passive: false });

                window.addEventListener('touchmove', (e) => {
                    if (e.touches.length === 1) {
                        const touch = e.touches[0];
                        if (state.mode === 'draw' && state.isDrawingMode) {
                            const worldPos = this.toWorld(touch.clientX, touch.clientY);
                            state.penPoints.push(worldPos);
                        } else if (this.isDragging) {
                            const dx = touch.clientX - this.lastMouseX;
                            const dy = touch.clientY - this.lastMouseY;

                            const s = this.scale * this.zoom;
                            this.targetCamX -= dx / s;
                            this.targetCamY += dy / s;

                            this.lastMouseX = touch.clientX;
                            this.lastMouseY = touch.clientY;
                        }
                    } else if (e.touches.length === 2 && state.mode !== 'draw') {
                        e.preventDefault();
                        if (this.initialPinchDistance) {
                            const dx = e.touches[0].clientX - e.touches[1].clientX;
                            const dy = e.touches[0].clientY - e.touches[1].clientY;
                            const currentDistance = Math.hypot(dx, dy);
                            const factor = currentDistance / this.initialPinchDistance;

                            this.targetZoom = this.initialPinchZoom * factor;
                            this.targetZoom = Math.min(Math.max(this.targetZoom, 0.1), 1e5);

                            const centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                            const centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

                            const s_new = this.scale * this.targetZoom;
                            this.targetCamX = this.initialPinchCenterWorld.x - (centerX - this.width / 2) / s_new;
                            this.targetCamY = this.initialPinchCenterWorld.y + (centerY - this.height / 2) / s_new;
                        }
                    }
                }, { passive: false });

                window.addEventListener('touchend', (e) => {
                    if (state.mode === 'draw' && state.isDrawingMode && e.touches.length === 0) {
                        state.isDrawingMode = false;
                    }

                    if (e.touches.length < 2) {
                        this.initialPinchDistance = null;
                    }

                    if (e.touches.length === 1 && state.mode !== 'draw') {
                        this.isDragging = true;
                        this.lastMouseX = e.touches[0].clientX;
                        this.lastMouseY = e.touches[0].clientY;
                    } else if (e.touches.length === 0) {
                        this.isDragging = false;
                    }
                });
            }

            smooth() {
                const lerp = (a, b, f) => a + (b - a) * f;
                this.camX = lerp(this.camX, this.targetCamX, this.lerpFactor);
                this.camY = lerp(this.camY, this.targetCamY, this.lerpFactor);
                this.zoom = lerp(this.zoom, this.targetZoom, this.lerpFactor);
            }

            clear() {
                this.ctx.fillStyle = this.colors.background;
                this.ctx.fillRect(0, 0, this.width, this.height);
            }

            drawGrid() {
                const s = this.scale * this.zoom;
                const targetPixelStep = 100;
                let unitStep = targetPixelStep / s;

                const magnitude = Math.pow(10, Math.floor(Math.log10(unitStep)));
                const relStep = unitStep / magnitude;
                if (relStep < 1.5) unitStep = 1 * magnitude;
                else if (relStep < 3.5) unitStep = 2 * magnitude;
                else if (relStep < 7.5) unitStep = 5 * magnitude;
                else unitStep = 10 * magnitude;

                const pixelStep = unitStep * s;
                this.ctx.lineWidth = 1;

                // Viewport boundaries in world units
                const topLeft = this.toWorld(0, 0);
                const bottomRight = this.toWorld(this.width, this.height);

                // Align start world grid line
                const startX = Math.floor(topLeft.x / unitStep) * unitStep;
                const endX = Math.ceil(bottomRight.x / unitStep) * unitStep;
                const startY = Math.floor(bottomRight.y / unitStep) * unitStep;
                const endY = Math.ceil(topLeft.y / unitStep) * unitStep;

                for (let ux = startX; ux <= endX; ux += unitStep) {
                    const sx = this.toScreen(ux, 0).x;
                    this.ctx.strokeStyle = this.colors.grid;
                    this.ctx.beginPath();
                    this.ctx.moveTo(sx, 0);
                    this.ctx.lineTo(sx, this.height);
                    this.ctx.stroke();
                }

                for (let uy = startY; uy <= endY; uy += unitStep) {
                    const sy = this.toScreen(0, uy).y;
                    this.ctx.strokeStyle = this.colors.grid;
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, sy);
                    this.ctx.lineTo(this.width, sy);
                    this.ctx.stroke();
                }

                // Axes
                const origin = this.toScreen(0, 0);
                this.ctx.strokeStyle = this.colors.axis;
                this.ctx.lineWidth = 2;

                if (origin.y >= 0 && origin.y <= this.height) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, origin.y);
                    this.ctx.lineTo(this.width, origin.y);
                    this.ctx.stroke();
                }

                if (origin.x >= 0 && origin.x <= this.width) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(origin.x, 0);
                    this.ctx.lineTo(origin.x, this.height);
                    this.ctx.stroke();
                }
            }

            line(x1, y1, x2, y2, color, width = 0.01, checkSize = false) {
                const p1 = this.toScreen(x1, y1);
                const p2 = this.toScreen(x2, y2);
                if (checkSize && Math.abs(p1.x - p2.x) <= MIN_VISIBLE_SIZE && Math.abs(p1.y - p2.y) <= MIN_VISIBLE_SIZE) return false;
                const s = this.scale * this.zoom;
                this.ctx.strokeStyle = color || this.colors.primary;
                this.ctx.lineWidth = Math.max(0.25, width * s);
                // this.ctx.lineCap = 'round';
                this.ctx.beginPath();
                this.ctx.moveTo(p1.x, p1.y);
                this.ctx.lineTo(p2.x, p2.y);
                this.ctx.stroke();
                return true;
            }

            circle(x, y, r, color, width = 0.01, fill = false, checkSize = false) {
                const s = this.scale * this.zoom;
                if (checkSize && r * s * 2 <= MIN_VISIBLE_SIZE) return false;
                const p = this.toScreen(x, y);
                this.ctx.beginPath();
                this.ctx.arc(p.x, p.y, r * s, 0, Math.PI * 2);
                if (fill) {
                    this.ctx.fillStyle = color || this.colors.primary;
                    this.ctx.fill();
                } else {
                    this.ctx.strokeStyle = color || this.colors.primary;
                    this.ctx.lineWidth = Math.max(0.25, width * s);
                    this.ctx.stroke();
                }
                return true;
            }

            point(x, y, color, size = 0.02, checkSize = false) {
                const s = this.scale * this.zoom;
                if (checkSize && Math.max(1, size * s) * 2 <= MIN_VISIBLE_SIZE) return false;
                const p = this.toScreen(x, y);
                this.ctx.beginPath();
                this.ctx.arc(p.x, p.y, Math.max(1, size * s), 0, Math.PI * 2);
                this.ctx.fillStyle = color || this.colors.primary;
                this.ctx.fill();
                return true;
            }

            // Fixed-width line for paths
            fixedLine(x1, y1, x2, y2, color, pixelWidth = 1, alpha = 1.0, checkSize = false) {
                const p1 = this.toScreen(x1, y1);
                const p2 = this.toScreen(x2, y2);
                if (checkSize && Math.abs(p1.x - p2.x) <= MIN_VISIBLE_SIZE && Math.abs(p1.y - p2.y) <= MIN_VISIBLE_SIZE) return false;
                this.ctx.save();
                this.ctx.globalAlpha = alpha;
                this.ctx.strokeStyle = color;
                this.ctx.lineWidth = pixelWidth;
                this.ctx.beginPath();
                this.ctx.moveTo(p1.x, p1.y);
                this.ctx.lineTo(p2.x, p2.y);
                this.ctx.stroke();
                this.ctx.restore();
                return true;
            }

            fixedPoint(x, y, color, pixelSize = 3, checkSize = false) {
                if (checkSize && pixelSize * 2 <= MIN_VISIBLE_SIZE) return false;
                const p = this.toScreen(x, y);
                this.ctx.beginPath();
                this.ctx.arc(p.x, p.y, pixelSize, 0, Math.PI * 2);
                this.ctx.fillStyle = color || this.colors.primary;
                this.ctx.fill();
                return true;
            }

            fixedCircle(x, y, r, color, pixelWidth = 1, checkSize = false) {
                const s = this.scale * this.zoom;
                if (checkSize && r * s * 2 <= MIN_VISIBLE_SIZE) return false;
                const p = this.toScreen(x, y);
                this.ctx.beginPath();
                this.ctx.arc(p.x, p.y, r * s, 0, Math.PI * 2);
                this.ctx.strokeStyle = color || this.colors.primary;
                this.ctx.lineWidth = pixelWidth;
                this.ctx.stroke();
                return true;
            }

            arrowhead(x, y, angle, color, headSizeWorld = 0.05) {
                const s = this.scale * this.zoom;
                if (headSizeWorld * s < 0.25) return false;

                const alpha = Math.PI / 7;
                const pTip = this.toScreen(x, y);
                const pWing1 = this.toScreen(
                    x - headSizeWorld * Math.cos(angle - alpha),
                    y - headSizeWorld * Math.sin(angle - alpha)
                );
                const pWing2 = this.toScreen(
                    x - headSizeWorld * Math.cos(angle + alpha),
                    y - headSizeWorld * Math.sin(angle + alpha)
                );

                this.ctx.save();
                this.ctx.fillStyle = color || this.colors.primary;
                this.ctx.beginPath();
                this.ctx.moveTo(pTip.x, pTip.y);
                this.ctx.lineTo(pWing1.x, pWing1.y);
                this.ctx.lineTo(pWing2.x, pWing2.y);
                this.ctx.closePath();
                this.ctx.fill();
                this.ctx.restore();
                return true;
            }

            fixedPath(points, color, pixelWidth = 1, alpha = 1.0, isClosed = false) {
                if (!points || points.length < 2) return;
                this.ctx.save();
                this.ctx.globalAlpha = alpha;
                this.ctx.strokeStyle = color;
                this.ctx.lineWidth = pixelWidth;
                this.ctx.lineCap = 'round';
                this.ctx.lineJoin = 'round';
                this.ctx.beginPath();

                const getX = (p) => p.x !== undefined ? p.x : p.re;
                const getY = (p) => p.y !== undefined ? p.y : p.im;

                let p = this.toScreen(getX(points[0]), getY(points[0]));
                this.ctx.moveTo(p.x, p.y);
                for (let i = 1; i < points.length; i++) {
                    p = this.toScreen(getX(points[i]), getY(points[i]));
                    this.ctx.lineTo(p.x, p.y);
                }
                if (isClosed) this.ctx.closePath();
                this.ctx.stroke();
                this.ctx.restore();
            }

            fadingPath(points, color, pixelWidth = 1, maxLen = 1000) {
                if (!points || points.length < 2) return;
                this.ctx.save();
                this.ctx.strokeStyle = color;
                this.ctx.lineWidth = pixelWidth;
                this.ctx.lineCap = 'round';
                this.ctx.lineJoin = 'round';

                const chunks = 25; // 25 stroke calls is very fast and looks perfectly smooth
                const chunkSize = Math.max(1, Math.ceil(points.length / chunks));

                const getX = (p) => p.x !== undefined ? p.x : p.re;
                const getY = (p) => p.y !== undefined ? p.y : p.im;

                for (let c = 0; c < chunks; c++) {
                    const startIdx = c * chunkSize;
                    if (startIdx >= points.length - 1) break;
                    const endIdx = Math.min(points.length, startIdx + chunkSize + 1);

                    this.ctx.globalAlpha = 0.8 * Math.max(0, 1.0 - (startIdx / maxLen));
                    this.ctx.beginPath();
                    let p = this.toScreen(getX(points[startIdx]), getY(points[startIdx]));
                    this.ctx.moveTo(p.x, p.y);
                    for (let i = startIdx + 1; i < endIdx; i++) {
                        p = this.toScreen(getX(points[i]), getY(points[i]));
                        this.ctx.lineTo(p.x, p.y);
                    }
                    this.ctx.stroke();
                }
                this.ctx.restore();
            }
        }

        function miniFFT(re, im) {
            var N = re.length;
            for (var i = 0; i < N; i++) {
                for (var j = 0, h = i, k = N; k >>= 1; h >>= 1)
                    j = (j << 1) | (h & 1);
                if (j > i) {
                    re[j] = [re[i], re[i] = re[j]][0]
                    im[j] = [im[i], im[i] = im[j]][0]
                }
            }
            for (var hN = 1; hN * 2 <= N; hN *= 2)
                for (var i = 0; i < N; i += hN * 2)
                    for (var j = i; j < i + hN; j++) {
                        var cos = Math.cos(Math.PI * (j - i) / hN),
                            sin = Math.sin(Math.PI * (j - i) / hN)
                        var tre = re[j + hN] * cos + im[j + hN] * sin,
                            tim = -re[j + hN] * sin + im[j + hN] * cos;
                        re[j + hN] = re[j] - tre; im[j + hN] = im[j] - tim;
                        re[j] += tre; im[j] += tim;
                    }
        }

        /**
         * Custom FFT using miniFFT
         */
        function computeFFT(x) {
            const N = x.length;
            const re = x.map(p => p.re);
            const im = x.map(p => p.im);
            miniFFT(re, im);
            const X = [];
            for (let k = 0; k < N; k++) {
                const r = re[k] / N;
                const i = im[k] / N;
                const freq = k <= N / 2 ? k : k - N;
                const amp = Math.sqrt(r * r + i * i);
                const phase = Math.atan2(i, r);
                X.push({ freq, amp, phase });
            }
            return X;
        }

        /**
         * Resample points to the nearest power of 2
         */
        function resamplePath(points) {
            if (points.length < 2) return [];

            // Calculate current path length
            let totalDist = 0;
            const dists = [0];
            for (let i = 1; i < points.length; i++) {
                const d = Math.sqrt(Math.pow(points[i].x - points[i - 1].x, 2) + Math.pow(points[i].y - points[i - 1].y, 2));
                totalDist += d;
                dists.push(totalDist);
            }

            // Target count: nearest power of 2, minimum 256
            const targetCount = Math.max(256, Math.pow(2, Math.round(Math.log2(points.length))));
            const resampled = [];

            for (let i = 0; i < targetCount; i++) {
                const targetDist = (i / targetCount) * totalDist;

                // Find segment
                let low = 0, high = dists.length - 1;
                while (low < high) {
                    let mid = (low + high) >> 1;
                    if (dists[mid] < targetDist) low = mid + 1;
                    else high = mid;
                }
                const index = low;

                if (index === 0) {
                    resampled.push({ re: points[0].x, im: points[0].y });
                } else {
                    const p1 = points[index - 1];
                    const p2 = points[index];
                    const t = (targetDist - dists[index - 1]) / (dists[index] - dists[index - 1]);
                    resampled.push({
                        re: p1.x + (p2.x - p1.x) * t,
                        im: p1.y + (p2.y - p1.y) * t
                    });
                }
            }
            return resampled;
        }

        function generatePreset(type) {
            const points = [];
            const size = 0.8;
            if (type === 'square') {
                for (let i = 0; i < 4; i++) {
                    const t = (i / 4) * Math.PI * 2 + Math.PI / 4;
                    points.push({ x: Math.cos(t) * size * 1.4, y: Math.sin(t) * size * 1.4 });
                }
                points.push({ x: points[0].x, y: points[0].y });
            } else if (type === 'triangle') {
                for (let i = 0; i < 3; i++) {
                    const t = (i / 3) * Math.PI * 2 + Math.PI / 2;
                    points.push({ x: Math.cos(t) * size * 1.4, y: Math.sin(t) * size * 1.4 });
                }
                points.push({ x: points[0].x, y: points[0].y });
            } else if (type === 'pentagon') {
                for (let i = 0; i < 5; i++) {
                    const t = (i / 5) * Math.PI * 2 + Math.PI / 2;
                    points.push({ x: Math.cos(t) * size * 1.4, y: Math.sin(t) * size * 1.4 });
                }
                points.push({ x: points[0].x, y: points[0].y });
            } else if (type === 'pentagram') {
                for (let i = 0; i < 10; i++) {
                    const t = (i / 10) * Math.PI * 2 + Math.PI / 2;
                    const r = i % 2 === 0 ? size * 1.5 : size * 0.6;
                    points.push({ x: Math.cos(t) * r, y: Math.sin(t) * r });
                }
                points.push({ x: points[0].x, y: points[0].y });
            } else if (type === 'circle') {
                for (let i = 0; i < 128; i++) {
                    const t = (i / 128) * Math.PI * 2;
                    points.push({ x: Math.cos(t) * size, y: Math.sin(t) * size });
                }
                points.push({ x: points[0].x, y: points[0].y });
            } else if (type === 'infinity') {
                for (let i = 0; i < 128; i++) {
                    const t = (i / 128) * Math.PI * 2;
                    points.push({ x: Math.cos(t) * size * 1.5, y: Math.sin(2 * t) * size * 0.7 });
                }
            } else if (type === 'butterfly') {
                for (let i = 0; i < 128; i++) {
                    const t = (i / 128) * Math.PI * 2;
                    const r = Math.exp(Math.cos(t)) - 2 * Math.cos(4 * t) + Math.pow(Math.sin(t / 12), 5);
                    points.push({ x: r * Math.sin(t) * 0.4, y: r * Math.cos(t) * 0.4 });
                }
            }
            return resamplePath(points);
        }

        let fourier = generatePreset('square');
        const rc = new RenderingContext(canvas, ctx);

            mode: 'animate', // 'animate' or 'draw'

        function updateFFT(newPath) {
            if (!newPath || newPath.length < 2) return;

            // Normalize path: center and scale to roughly fit unit view
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            newPath.forEach(p => {
                minX = Math.min(minX, p.re); maxX = Math.max(maxX, p.re);
                minY = Math.min(minY, p.im); maxY = Math.max(maxY, p.im);
            });
            const cx = (minX + maxX) / 2;
            const cy = (minY + maxY) / 2;
            const size = Math.max(maxX - minX, maxY - minY);
            const scale = 2.0 / (size || 1); // target fits in [-1.0, 1.0] roughly

            newPath.forEach(p => {
                p.re = (p.re - cx) * scale;
                p.im = (p.im - cy) * scale;
            });

            pathData.length = 0;
            newPath.forEach(p => pathData.push(p));
            fourier = computeFFT(pathData);
            fourier.sort((a, b) => b.amp - a.amp);

            // Update range max
            const range = document.getElementById('harmonicsRange');
            range.value = 0.5;
            document.getElementById('harmonicsVal').innerText = state.harmonics;

            state.time = 0;
            state.tracedPath = [];

            // Trigger slider update to reflect new max harmonics
            updateHarmonicsFromSlider();
        }

        function processImageToPath(img) {
            const MAX_DIM = 1000;
            let w = img.width;
            let h = img.height;
            if (w > MAX_DIM || h > MAX_DIM) {
                const ratio = Math.min(MAX_DIM / w, MAX_DIM / h);
                w = Math.floor(w * ratio);
                h = Math.floor(h * ratio);
            }

            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, w, h);
            ctx.drawImage(img, 0, 0, w, h);

            const imgData = ctx.getImageData(0, 0, w, h);
            const data = imgData.data;

            const gray = new Float32Array(w * h);
            for (let i = 0; i < data.length; i += 4) {
                gray[i >> 2] = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
            }

            const mag = new Float32Array(w * h);
            const dir = new Float32Array(w * h);
            let maxMag = 0;

            const getP = (x, y) => {
                if (x < 0) x = 0; if (x >= w) x = w - 1;
                if (y < 0) y = 0; if (y >= h) y = h - 1;
                return gray[y * w + x];
            };

            for (let y = 1; y < h - 1; y++) {
                for (let x = 1; x < w - 1; x++) {
                    const gx = -getP(x - 1, y - 1) + getP(x + 1, y - 1)
                        - 2 * getP(x - 1, y) + 2 * getP(x + 1, y)
                        - getP(x - 1, y + 1) + getP(x + 1, y + 1);
                    const gy = -getP(x - 1, y - 1) - 2 * getP(x, y - 1) - getP(x + 1, y - 1)
                        + getP(x - 1, y + 1) + 2 * getP(x, y + 1) + getP(x + 1, y + 1);
                    const val = Math.sqrt(gx * gx + gy * gy);
                    mag[y * w + x] = val;
                    dir[y * w + x] = Math.atan2(gy, gx);
                    if (val > maxMag) maxMag = val;
                }
            }

            const nms = new Float32Array(w * h);
            let maxNms = 0;
            for (let y = 1; y < h - 1; y++) {
                for (let x = 1; x < w - 1; x++) {
                    const m = mag[y * w + x];
                    if (m === 0) continue;
                    let angle = dir[y * w + x] * (180 / Math.PI);
                    if (angle < 0) angle += 180;

                    let q = 255, r = 255;
                    if ((0 <= angle && angle < 22.5) || (157.5 <= angle && angle <= 180)) {
                        q = mag[y * w + (x + 1)]; r = mag[y * w + (x - 1)];
                    } else if (22.5 <= angle && angle < 67.5) {
                        q = mag[(y + 1) * w + (x + 1)]; r = mag[(y - 1) * w + (x - 1)];
                    } else if (67.5 <= angle && angle < 112.5) {
                        q = mag[(y + 1) * w + x]; r = mag[(y - 1) * w + x];
                    } else if (112.5 <= angle && angle < 157.5) {
                        q = mag[(y - 1) * w + (x + 1)]; r = mag[(y + 1) * w + (x - 1)];
                    }

                    if (m >= q && m >= r) {
                        nms[y * w + x] = m;
                        if (m > maxNms) maxNms = m;
                    }
                }
            }

            let points = [];
            const threshold = maxNms * 0.15;
            for (let y = 1; y < h - 1; y++) {
                for (let x = 1; x < w - 1; x++) {
                    if (nms[y * w + x] > threshold) {
                        points.push({ x: x - w / 2, y: -(y - h / 2) });
                    }
                }
            }

            if (points.length === 0) return [];

            const MAX_POINTS = 4096;
            if (points.length > MAX_POINTS) {
                const sampled = [];
                const step = points.length / MAX_POINTS;
                for (let i = 0; i < MAX_POINTS; i++) {
                    sampled.push(points[Math.floor(i * step)]);
                }
                points = sampled;
            }

            const path = [];
            const visited = new Uint8Array(points.length);

            let currIdx = 0;
            path.push(points[currIdx]);
            visited[currIdx] = 1;

            for (let step = 1; step < points.length; step++) {
                let bestDist = Infinity;
                let bestIdx = -1;
                const p1 = points[currIdx];

                for (let i = 0; i < points.length; i++) {
                    if (visited[i] === 0) {
                        const p2 = points[i];
                        const dx = p1.x - p2.x;
                        const dy = p1.y - p2.y;
                        const distSq = dx * dx + dy * dy;
                        if (distSq < bestDist) {
                            bestDist = distSq;
                            bestIdx = i;
                        }
                    }
                }

                if (bestIdx !== -1) {
                    currIdx = bestIdx;
                    path.push(points[currIdx]);
                    visited[currIdx] = 1;
                } else {
                    break;
                }
            }

            return resamplePath(path);
        }

        function sampleSVGPath(d) {
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', d);
            const len = path.getTotalLength();
            const points = [];
            const count = 512; // High resolution for complex SVGs
            for (let i = 0; i < count; i++) {
                const p = path.getPointAtLength((i / count) * len);
                points.push({ x: p.x, y: -p.y }); // Reverse Y axis to match Cartesian world
            }
            return resamplePath(points);
        }

        function update() {
            if (state.mode === 'draw') return;

            state.time += state.speed;

            // Compute current point
            let x = 0;
            let y = 0;
            for (let i = 0; i < Math.min(state.harmonics, fourier.length); i++) {
                const { freq, amp, phase } = fourier[i];
                x += amp * Math.cos(freq * state.time + phase);
                y += amp * Math.sin(freq * state.time + phase);
            }

            // Record path
            state.tracedPath.unshift({ x, y });
            const maxLen = Math.ceil((Math.PI * 2) / state.speed);
            if (state.tracedPath.length > maxLen) {
                state.tracedPath.length = maxLen;
            }

            // Camera follow
            if (state.follow) {
                rc.targetCamX = x;
                rc.targetCamY = y;
            }

            rc.smooth();
        }

        function draw() {
            rc.clear();
            rc.drawGrid();

            if (state.mode === 'draw') {
                // Drawing Preview
                if (state.penPoints.length > 1) {
                    rc.fixedPath(state.penPoints, rc.colors.primary, 3, 1.0, false);
                }
                requestAnimationFrame(draw);
                return;
            }

            // 1. Draw Original Path (Static, subtle)
            if (pathData.length > 1) {
                rc.fixedPath(pathData, rc.colors.path, 1, 1.0, true);
            }

            // 2. Draw Epicycles
            let x = 0;
            let y = 0;
            let lastVisibleX = 0;
            let lastVisibleY = 0;

            for (let i = 0; i < Math.min(state.harmonics, fourier.length); i++) {
                const { freq, amp, phase } = fourier[i];
                x += amp * Math.cos(freq * state.time + phase);
                y += amp * Math.sin(freq * state.time + phase);

                let drawnAny = false;

                if (state.showCircles) {
                    // Draw Circle (fixed pixel width stroke) at the current end of the vector chain
                    // However, we center it at the THEORETICAL previous position (stalling it might look weird for circles)
                    // Wait, if it's too small, it's skipped.
                    const prevX = x - amp * Math.cos(freq * state.time + phase);
                    const prevY = y - amp * Math.sin(freq * state.time + phase);
                    if (rc.circle(prevX, prevY, amp, rc.colors.circles, amp * 0.005, false, true)) {
                        drawnAny = true;
                    }
                }

                if (state.showVectors) {
                    // Draw Vector from last visible position to current theoretical position
                    const dx = x - lastVisibleX;
                    const dy = y - lastVisibleY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const angle = Math.atan2(dy, dx);
                    const headSize = amp * 0.15;
                    const shortening = headSize * Math.cos(Math.PI / 7); // Slightly less than base to ensure overlap

                    // Shorten the line so it doesn't overlap with the arrowhead
                    if (dist > shortening) {
                        const xShort = x - shortening * Math.cos(angle);
                        const yShort = y - shortening * Math.sin(angle);
                        rc.line(lastVisibleX, lastVisibleY, xShort, yShort, rc.colors.vector, amp * 0.01, true);

                        rc.arrowhead(x, y, angle, rc.colors.vector, headSize);
                        lastVisibleX = x;
                        lastVisibleY = y;
                        drawnAny = true;
                    }
                } else {
                    // Even if vectors are hidden, we should update lastVisible if a virtual "segment" was handled?
                    // Actually, if vectors are hidden, there's no "chain" to connect visually.
                    // But we should probably keep track of where we are.
                    lastVisibleX = x;
                    lastVisibleY = y;
                }
            }

            // 3. Draw Fitted Path (Fade-out over one period)
            const maxLen = Math.ceil((Math.PI * 2) / state.speed);
            if (state.tracedPath.length > 1) {
                rc.fadingPath(state.tracedPath, rc.colors.secondary, 2, maxLen);
            }

            // 4. Current Point
            rc.fixedPoint(x, y, '#fff', 4);

            // 5. Minimap Overlay
            if (state.showMap && pathData.length > 0) {
                const mapSize = 150;

                minictx.clearRect(0, 0, mapSize, mapSize);

                // Find bounds for minimap
                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                pathData.forEach(p => {
                    minX = Math.min(minX, p.re); maxX = Math.max(maxX, p.re);
                    minY = Math.min(minY, p.im); maxY = Math.max(maxY, p.im);
                });
                const cx = (minX + maxX) / 2;
                const cy = (minY + maxY) / 2;
                const size = Math.max(maxX - minX, maxY - minY) || 1;
                const scale = (mapSize * 0.8) / size;

                const toMapCoords = (wx, wy) => {
                    return {
                        x: mapSize / 2 + (wx - cx) * scale,
                        y: mapSize / 2 - (wy - cy) * scale // y is flipped in world
                    };
                };

                // Draw original path in minimap
                minictx.beginPath();
                for (let i = 0; i < pathData.length; i++) {
                    const p = pathData[i];
                    const pts = toMapCoords(p.re, p.im);
                    if (i === 0) minictx.moveTo(pts.x, pts.y);
                    else minictx.lineTo(pts.x, pts.y);
                }
                minictx.closePath();
                minictx.strokeStyle = rc.colors.path;
                minictx.lineWidth = 1;
                minictx.stroke();

                // Draw current position
                const current = toMapCoords(x, y);
                minictx.beginPath();
                minictx.arc(current.x, current.y, 3, 0, Math.PI * 2);
                minictx.fillStyle = '#4cc9f0';
                minictx.fill();

                // Draw viewport rect
                const tl = rc.toWorld(0, 0);
                const br = rc.toWorld(rc.width, rc.height);
                const tlm = toMapCoords(tl.x, tl.y);
                const brm = toMapCoords(br.x, br.y);
                minictx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                minictx.lineWidth = 1;
                minictx.strokeRect(tlm.x, tlm.y, brm.x - tlm.x, brm.y - tlm.y);
            }

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        function acquireWakelock() {
            if ('wakeLock' in navigator) {
                try {
                    navigator.wakeLock.request('screen').then(lock => {
                        lock.addEventListener('release', e => {
                            console.log("wakelock released");
                        })
                    });
                } catch (error) {
                    console.error(error);
                }
            }
        }

        document.addEventListener("visibilitychange", function () {
            if (document.visibilityState === 'visible') {
                acquireWakelock();
            }
        });
        acquireWakelock();

        setup();
        draw();
    </script>
</body>

</html>
