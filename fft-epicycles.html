            });

            // Font Source Selection
            const srcSystemBtn = document.getElementById('srcSystemBtn');
            const srcFileBtn = document.getElementById('srcFileBtn');
            const systemFontContainer = document.getElementById('systemFontContainer');
            const fileFontContainer = document.getElementById('fileFontContainer');

            srcSystemBtn.addEventListener('click', () => {
                state.fontSource = 'system';
                srcSystemBtn.classList.add('active');
                srcFileBtn.classList.remove('active');
                systemFontContainer.style.display = 'block';
                fileFontContainer.style.display = 'none';
            });

            srcFileBtn.addEventListener('click', () => {
                state.fontSource = 'custom';
                srcFileBtn.classList.add('active');
                srcSystemBtn.classList.remove('active');
                fileFontContainer.style.display = 'block';
                systemFontContainer.style.display = 'none';
            });

            // Local Font Access
            const localFontBtn = document.getElementById('localFontBtn');
            if ('queryLocalFonts' in window) {
                localFontBtn.style.display = 'block';
                localFontBtn.addEventListener('click', loadLocalFonts);
            }

            document.getElementById('localFontSelect').addEventListener('change', async (e) => {
                const family = e.target.value;
                if (!family) return;
                try {
                    const fonts = await window.queryLocalFonts();
                    const fontData = fonts.find(f => f.family === family);
                    if (fontData) {
                        const blob = await fontData.blob();
                        const buffer = await blob.arrayBuffer();
                        state.systemFont = opentype.parse(buffer);
                        console.log("Loaded system font:", family);
                    }
                } catch (e) {
                    console.error("Failed to load local font:", e);
                }
            });

            // Font File Upload
            document.getElementById('fontFileBtn').addEventListener('click', () => {
                document.getElementById('fontFileInput').click();
            });

            document.getElementById('fontFileInput').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        state.customFont = opentype.parse(event.target.result);
                        console.log("Loaded font file:", file.name);
                    } catch (err) {
                        console.error("Failed to parse font file:", err);
                        alert("Invalid font file. Please use a valid .ttf or .otf file.");
                    }
                };
                reader.readAsArrayBuffer(file);
            });

            // Populate presets
            const presetSelect = document.getElementById('presetSelect');
            Object.keys(PRESETS).forEach(key => {
                const opt = document.createElement('option');
                opt.value = key;
                opt.textContent = PRESETS[key].name;
                presetSelect.appendChild(opt);
            });

            // Load initial preset
            updateFFT(generatePreset('square'));

            return { updateFollowState };
        }

        const visibleVectorItems = new Set();
        let vectorObserver = null;

        function buildVectorGrid() {
            const grid = document.getElementById('vectorGrid');
            grid.innerHTML = '';

            // Cleanup old observer
            if (vectorObserver) vectorObserver.disconnect();
            visibleVectorItems.clear();

            // Create IntersectionObserver scoped to the grid's scroll container
            vectorObserver = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    if (e.isIntersecting) visibleVectorItems.add(e.target);
                    else visibleVectorItems.delete(e.target);
                });
            }, { root: grid, threshold: 0 });

            for (let i = 0; i < Math.min(state.harmonics, fourier.length); i++) {
                const v = fourier[i];
                const item = document.createElement('div');
                item.className = 'vector-item' + (state.selectedVector === i ? ' selected' : '');
                item.dataset.idx = i;

                const cvs = document.createElement('canvas');
                cvs.width = 96; cvs.height = 96;
                item.appendChild(cvs);

                const lbl = document.createElement('span');
                lbl.className = 'freq-label';
                lbl.textContent = v.freq;
                item.appendChild(lbl);

                item.addEventListener('click', () => {
                    if (state.selectedVector === i) {
                        state.selectedVector = -1;
                    } else {
                        state.selectedVector = i;
                    }
                    // Update selection visual
                    grid.querySelectorAll('.vector-item').forEach((el, idx) => {
                        el.classList.toggle('selected', idx === state.selectedVector);
                    });
                });

                item.addEventListener('dblclick', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    state.selectedVector = i;

                    // Zoom and follow the vector
                    rc.targetZoom = 1 / v.amp;
                    updateFollowState(true);

                    // Update selection visual
                    grid.querySelectorAll('.vector-item').forEach((el, idx) => {
                        el.classList.toggle('selected', idx === state.selectedVector);
                    });

                });

                grid.appendChild(item);
                vectorObserver.observe(item);
            }
        }

        function updateVectorIcons() {
            if (!document.getElementById('vectorPopover').classList.contains('active')) return;
            if (visibleVectorItems.size === 0) return;

            visibleVectorItems.forEach(item => {
                const i = parseInt(item.dataset.idx);
                if (i >= fourier.length) return;
                const cvs = item.querySelector('canvas');
                if (!cvs) return;
                const c = cvs.getContext('2d');
                const w = cvs.width, h = cvs.height;
                c.clearRect(0, 0, w, h);

                const v = fourier[i];
                const angle = v.freq * state.time + v.phase;
                const cx = w / 2, cy = h / 2;
                const radius = w * 0.4;


                // Draw circle outline
                c.beginPath();
                c.arc(cx, cy, radius, 0, Math.PI * 2);
                c.strokeStyle = 'rgba(255,255,255,0.1)';
                c.lineWidth = 1;
                c.stroke();

                // Draw arrow
                const ex = cx + radius * Math.cos(-angle);
                const ey = cy + radius * Math.sin(-angle);
                c.beginPath();
                c.moveTo(cx, cy);
                c.lineTo(ex, ey);
                c.strokeStyle = v.color;
                c.lineWidth = 2.5;
                c.stroke();

                // Arrowhead
                const headLen = 12;
                const a1 = -angle + Math.PI * 0.8;
                const a2 = -angle - Math.PI * 0.8;
                c.beginPath();
                c.moveTo(ex, ey);
                c.lineTo(ex + headLen * Math.cos(a1), ey + headLen * Math.sin(a1));
                c.moveTo(ex, ey);
                c.lineTo(ex + headLen * Math.cos(a2), ey + headLen * Math.sin(a2));
                c.strokeStyle = v.color;
                c.lineWidth = 2;
                c.stroke();

                // Dot at center
                c.beginPath();
                c.arc(cx, cy, 2, 0, Math.PI * 2);
                c.fillStyle = v.color;
                c.fill();
            });
        }

        const VECTOR_PALETTE = [[128, 128, 128], [76, 201, 240], [255, 255, 0], [247, 37, 133]];

        function getColor(pal, t) {
            // 边界处理
            if (t <= 0) return pal[0];
            if (t >= 1) return pal[pal.length - 1];

            // 计算当前 t 落在哪个区间
            // 比如 4 个颜色有 3 个区间，scaledT 会在 0-3 之间
            const scaledT = t * (pal.length - 1);
            const index = Math.floor(scaledT); // 左侧颜色索引
            const weight = scaledT - index;     // 插值权重 (0-1)

            const c1 = pal[index];
            const c2 = pal[index + 1];

            // 对 RGB 分量分别进行线性插值 (lerp)
            return [
                Math.round(c1[0] * (1 - weight) + c2[0] * weight),
                Math.round(c1[1] * (1 - weight) + c2[1] * weight),
                Math.round(c1[2] * (1 - weight) + c2[2] * weight)
            ];
        }

        function update() {
            if (state.mode === 'draw') return;

            if (!state.paused) {
                state.time += state.speed;
            }

            // Compute current point
            let x = 0;
            let y = 0;
            for (let i = 0; i < Math.min(state.harmonics, fourier.length); i++) {
                const { freq, amp, phase } = fourier[i];
                x += amp * Math.cos(freq * state.time + phase);
                y += amp * Math.sin(freq * state.time + phase);
            }

            // Record path
            state.tracedPath.unshift({ x, y });
            const maxLen = Math.ceil((Math.PI * 2) / state.speed);
            if (state.tracedPath.length > maxLen) {
                state.tracedPath.length = maxLen;
            }

            // Camera follow
            if (state.follow) {
                // Determine follow target
                let tx = x, ty = y;
                if (state.selectedVector >= 0 && state.selectedVector < Math.min(state.harmonics, fourier.length)) {
                    // Follow the root of the selected vector
                    tx = 0; ty = 0;
                    for (let i = 0; i < state.selectedVector; i++) {
                        const { freq, amp, phase } = fourier[i];
                        tx += amp * Math.cos(freq * state.time + phase);
                        ty += amp * Math.sin(freq * state.time + phase);
                    }
                }

                if (state.snapFollow) {
                    // Instant (no smoothing)
                    rc.camX = tx;
                    rc.camY = ty;
                    rc.targetCamX = tx;
                    rc.targetCamY = ty;
                } else {
                    // Smooth
                    rc.targetCamX = tx;
                    rc.targetCamY = ty;
                }
            }

            rc.smooth();

            // Update vector icons every few frames
            updateVectorIcons();
        }

        const progressRange = document.getElementById('progressRange');
        const progressVal = document.getElementById('progressVal');

        function draw() {
            rc.clear();
            rc.drawGrid();

            if (state.mode === 'draw') {
                // Drawing Preview
                if (state.penPoints.length > 1) {
                    rc.fixedPath(state.penPoints, rc.colors.primary, 3, 1.0, false);
                }
                requestAnimationFrame(draw);
                return;
            }

            // 1. Draw Original Path (Static, subtle)
            if (state.showPath && pathData.length > 1) {
                rc.fixedPath(pathData, rc.colors.path, 1, 1.0, true);
            }

            // 2. Draw Epicycles
            let x = 0;
            let y = 0;
            let lastVisibleX = 0;
            let lastVisibleY = 0;

            for (let i = 0; i < Math.min(state.harmonics, fourier.length); i++) {
                const { freq, amp, phase, colorTrans } = fourier[i];
                x += amp * Math.cos(freq * state.time + phase);
                y += amp * Math.sin(freq * state.time + phase);

                let drawnAny = false;

                const isSelected = (state.selectedVector === i);
                const circleColor = isSelected ? '#ffffff' : rc.colors.circles;
                const vectorColor = isSelected ? '#ffffff' : (
                    state.vectorColorByAmp ? colorTrans : rc.colors.vector
                );

                if (state.showCircles) {
                    const prevX = x - amp * Math.cos(freq * state.time + phase);
                    const prevY = y - amp * Math.sin(freq * state.time + phase);
                    //  circle(x, y, r, color, width = 0.01, fill = false, checkSize = false, minWidth = 0.25) {
                    if (rc.circle(prevX, prevY, amp, circleColor, amp * 0.005, false, true, 0)) {
                        drawnAny = true;
                    }
                }

                if (state.showVectors) {
                    const dx = x - lastVisibleX;
                    const dy = y - lastVisibleY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const angle = Math.atan2(dy, dx);

                    if (rc.getScreenDist(dist) > 1) {
                        const headSize = amp * 0.15;
                        const shortening = headSize * Math.cos(Math.PI / 7);
                        const xShort = x - shortening * Math.cos(angle);
                        const yShort = y - shortening * Math.sin(angle);
                        rc.line(lastVisibleX, lastVisibleY, xShort, yShort, vectorColor, amp * 0.01, true);

                        rc.arrowhead(x, y, angle, vectorColor, headSize);
                        lastVisibleX = x;
                        lastVisibleY = y;
                        drawnAny = true;
                    }
                } else {
                    lastVisibleX = x;
                    lastVisibleY = y;
                }
            }

            // 3. Draw Fitted Path (Fade-out over one period)
            const maxLen = Math.ceil((Math.PI * 2) / state.speed);
            if (state.tracedPath.length > 1) {
                if (state.pathFading) {
                    rc.fadingPath(state.tracedPath, rc.colors.secondary, 2, maxLen);
                } else {
                    rc.fixedPath(state.tracedPath, rc.colors.secondary, 2);
                }
            }

            // 4. Current Point
            rc.fixedPoint(x, y, '#fff', 4);

            // 5. Minimap Overlay
            if (state.showMap && pathData.length > 0) {
                const mapSize = 150;

                minictx.clearRect(0, 0, mapSize, mapSize);

                // Find bounds for minimap
                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                pathData.forEach(p => {
                    minX = Math.min(minX, p.re); maxX = Math.max(maxX, p.re);
                    minY = Math.min(minY, p.im); maxY = Math.max(maxY, p.im);
                });
                const cx = (minX + maxX) / 2;
                const cy = (minY + maxY) / 2;
                const size = Math.max(maxX - minX, maxY - minY) || 1;
                const scale = (mapSize * 0.8) / size;

                const toMapCoords = (wx, wy) => {
                    return {
                        x: mapSize / 2 + (wx - cx) * scale,
                        y: mapSize / 2 - (wy - cy) * scale // y is flipped in world
                    };
                };

                // Draw original path in minimap
                minictx.beginPath();

                // Auto-simplify path
                let accumulatedDistance = 0;
                let lastPoint = null;
                for (let i = 0; i < pathData.length; i++) {
                    const p = pathData[i];
                    const pts = toMapCoords(p.re, p.im);
                    if (i === 0) {
                        minictx.moveTo(pts.x, pts.y);
                        lastPoint = pts;
                    } else {
                        const dx = pts.x - lastPoint.x;
                        const dy = pts.y - lastPoint.y;
                        accumulatedDistance += dx * dx + dy * dy;
                        if (accumulatedDistance > 1 || i === pathData.length - 1) {
                            minictx.lineTo(pts.x, pts.y);
                            lastPoint = pts;
                            accumulatedDistance = 0;
                        }
                    }
                }
                minictx.closePath();
                minictx.strokeStyle = rc.colors.path;
                minictx.lineWidth = 1;
                minictx.stroke();

                // Draw current position
                const current = toMapCoords(x, y);
                minictx.beginPath();
                minictx.arc(current.x, current.y, 3, 0, Math.PI * 2);
                minictx.fillStyle = '#4cc9f0';
                minictx.fill();

                // Draw viewport rect
                const tl = rc.toWorld(0, 0);
                const br = rc.toWorld(rc.width, rc.height);
                const tlm = toMapCoords(tl.x, tl.y);
                const brm = toMapCoords(br.x, br.y);
                minictx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                minictx.lineWidth = 1;
                minictx.strokeRect(tlm.x, tlm.y, brm.x - tlm.x, brm.y - tlm.y);
            }

            // Update progress range
            let progressValue = state.time % (Math.PI * 2);
            progressRange.value = progressValue;
            updateProgressText(progressValue);


            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        function acquireWakelock() {
            if ('wakeLock' in navigator) {
                try {
                    navigator.wakeLock.request('screen').then(lock => {
                        lock.addEventListener('release', e => {
                            console.log("wakelock released");
                        })
                    });
                } catch (error) {
                    console.error(error);
                }
            }
        }

        document.addEventListener("visibilitychange", function () {
            if (document.visibilityState === 'visible') {
                acquireWakelock();
            }
        });
        acquireWakelock();

        let { updateFollowState } = setup();
        draw();
    </script>
