<!DOCTYPE html>
<html>

<head>
    <title>FFT Epicycles</title>
    <script defer src="https://cdn.jsdelivr.net/npm/opentype.js/dist/opentype.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Compact Floating Toolbar */
        .toolbar {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            z-index: 1000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .toolbar-main {
            display: flex;
            flex-direction: row;
            background: rgba(20, 20, 25, 0.7);
            /* backdrop-filter: blur(15px); */
            /* -webkit-backdrop-filter: blur(15px); */
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 5px;
            gap: 5px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toolbar.collapsed .toolbar-main {
            overflow: hidden;
            padding: 5px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            min-width: 40px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: background 0.2s, transform 0.1s;
            position: relative;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .icon-btn:active {
            transform: scale(0.9);
        }

        .icon-btn.active {
            background: rgba(76, 201, 240, 0.4);
            box-shadow: 0 0 8px rgba(76, 201, 240, 0.6);
        }

        /* Pop-up Controls */
        .popover {
            position: absolute;
            bottom: 60px;
            right: 0;
            background: rgba(20, 20, 25, 0.9);
            /* backdrop-filter: blur(15px); */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            display: none;
            flex-direction: column;
            gap: 8px;
            min-width: 180px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            z-index: 1100;
        }

        .popover.active {
            display: flex;
        }

        .popover .label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 4px;
        }

        .popover .val-text {
            color: #4cc9f0;
            font-weight: bold;
            font-size: 12px;
        }

        /* Custom Form Styling */
        .popover input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: transparent;
            margin: 12px 0;
            cursor: pointer;
        }

        .popover input[type="range"]:focus {
            outline: none;
        }

        /* Track */
        .popover input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            transition: background 0.2s;
        }

        .popover input[type="range"]:hover::-webkit-slider-runnable-track {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Thumb */
        .popover input[type="range"]::-webkit-slider-thumb {
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #4cc9f0;
            -webkit-appearance: none;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(76, 201, 240, 0.5);
            transition: transform 0.1s;
        }

        .popover input[type="range"]:active::-webkit-slider-thumb {
            transform: scale(1.2);
        }

        /* Firefox Support */
        .popover input[type="range"]::-moz-range-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        .popover input[type="range"]::-moz-range-thumb {
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #4cc9f0;
            border: none;
            box-shadow: 0 0 10px rgba(76, 201, 240, 0.5);
        }

        .popover input[type="text"],
        .popover select {
            width: 100%;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            color: #fff;
            padding: 6px 12px;
            font-family: inherit;
            font-size: 13px;
            outline: none;
            transition: all 0.2s;
        }

        .popover input[type="text"]:focus,
        .popover select:focus {
            border-color: #4cc9f0;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 8px rgba(76, 201, 240, 0.2);
        }

        .popover select option {
            background: #141419;
            color: #fff;
        }

        .popover .action-btn {
            width: 100%;
            border: none;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.2s;
            background: #4cc9f0;
            color: #000;
            margin-top: 8px;
        }

        .popover .action-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(76, 201, 240, 0.3);
        }

        .popover .action-btn:active {
            transform: translateY(0);
        }

        /* Hide elements when collapsed */
        .toolbar.collapsed .hidden-on-collapse {
            display: none;
        }

        .hidden-on-collapse {
            display: flex;
            flex-direction: row;
            gap: 5px;
            max-height: 60vh;
            overflow-y: auto;
            border-right: 1px solid gray;
        }

        /* Vector Grid inside popover */
        .vector-grid,
        .view-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            max-height: 280px;
            max-width: 260px;
            overflow-y: auto;
            padding: 4px;
            gap: 8px;
        }

        .vector-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 2px;
            border-radius: 8px;
            transition: background 0.15s;
            border: 2px solid transparent;
        }

        .vector-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .vector-item.selected {
            border-color: #4cc9f0;
            background: rgba(76, 201, 240, 0.1);
        }

        .vector-item canvas {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
        }

        .vector-item .freq-label {
            font-size: 10px;
            margin-top: 2px;
            color: #aaa;
            white-space: nowrap;
        }

        /* Responsive vertical toolbar for narrow screens */
        @media (max-width: 600px) {
            .toolbar-main {
                flex-direction: column;
                border-radius: 25px;
            }

            .hidden-on-collapse {
                flex-direction: column;
                border-right: none;
                border-bottom: 1px solid gray;
            }

            .popover {
                bottom: 15px;
                right: 60px;
            }
        }

        .font-source-toggle button.active {
            background: rgba(76, 201, 240, 0.2) !important;
            color: #4cc9f0 !important;
        }

        #minimap {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 150px;
            height: 150px;
            background: rgba(20, 20, 25, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            z-index: 1000;
            pointer-events: none;
            display: block;
            /* backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px); */
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>
    <canvas id="minimap"></canvas>

    <div class="toolbar" id="mainToolbar">
        <div class="toolbar-main">
            <div class="hidden-on-collapse">
                <!-- Presets -->
                <button class="icon-btn" id="presetsBtn" title="Presets">🎁</button>
                <div class="popover" id="presetsPopover">
                    <span class="label">Load a Preset Path</span>
                    <select id="presetSelect"></select>
                </div>

                <!-- Pen -->
                <button class="icon-btn" id="penBtn" title="Draw Path">✏️</button>

                <!-- SVG / Image -->
                <button class="icon-btn" id="svgBtnIcon" title="Import/Settings for Image">🖼️</button>
                <div class="popover" id="svgPopover" style="min-width: 200px;">
                    <span class="label">Load an Image/SVG Path</span>

                    <div style="display: flex; gap: 5px; margin-top: 0;">
                        <button id="svgBtnFile" class="action-btn" style="flex: 1;">Upload</button>
                        <button id="svgBtnApply" class="action-btn"
                            style="flex: 1; background: #4cc9f0; color: #000;">Apply</button>
                    </div>
                    <input type="file" id="svgInput" accept=".svg, image/*" style="display:none">

                    <span class="label" style="margin-top:10px">Target Points (<span id="maxPtsVal"
                            class="val-text">4096</span>)</span>
                    <input type="range" id="maxPtsRange" min="8" max="16" step="1" value="12">

                    <span class="label">Canny Thresh (%): <span id="cannyVal" class="val-text">15</span></span>
                    <input type="range" id="cannyRange" min="1" max="50" step="1" value="15">

                    <span class="label">Smooth Passes: <span id="smoothPVal" class="val-text">2</span></span>
                    <input type="range" id="smoothPRange" min="0" max="4" step="1" value="2">

                    <span class="label">Smooth Window: <span id="smoothWVal" class="val-text">2</span></span>
                    <input type="range" id="smoothWRange" min="2" max="5" step="1" value="2">

                    <span class="label">Curvature Wt: <span id="curvWVal" class="val-text">5</span></span>
                    <input type="range" id="curvWRange" min="0" max="10" step="1" value="5">
                </div>

                <!-- Text -->
                <button class="icon-btn" id="textBtnIcon" title="Text to Path">🔤</button>
                <div class="popover" id="textPopover">
                    <span class="label">Load a Text Path</span>
                    <input type="text" id="textInput" placeholder="Select font then enter text..."
                        style="width:100%; box-sizing:border-box">

                    <div class="font-source-toggle"
                        style="display:flex; margin-top:10px; border-radius:6px; padding:2px">
                        <button id="srcSystemBtn" class="action-btn active"
                            style="flex:1; font-size:11px; padding:6px; border-radius:4px; background:none; border:none; color:rgba(255,255,255,0.6)">System</button>
                        <button id="srcFileBtn" class="action-btn"
                            style="flex:1; font-size:11px; padding:6px; border-radius:4px; background:none; border:none; color:rgba(255,255,255,0.6)">Custom</button>
                    </div>

                    <div id="systemFontContainer" style="margin-top:8px">
                        <button id="localFontBtn" class="action-btn" style="width:100%; display:none">Load System
                            Fonts</button>
                        <select id="localFontSelect"
                            style="display:none; width:100%; background:#1e1e24; color:#fff; border:1px solid #3a3a45; padding:4px; border-radius:4px"></select>
                    </div>

                    <div id="fileFontContainer" style="margin-top:8px; display:none">
                        <button id="fontFileBtn" class="action-btn" style="width:100%">Upload Font (📂)</button>
                        <input type="file" id="fontFileInput" accept=".ttf,.otf" style="display:none">
                    </div>

                    <button id="textBtnRender" class="action-btn"
                        style="width:100%; margin-top:12px; background:#4cc9f0; color:#000">Build Path</button>
                </div>

                <!-- View Options -->
                <button class="icon-btn" id="viewBtn" title="View Options">👁️</button>
                <div class="popover" id="viewPopover">
                    <span class="label">View Toggles</span>
                    <div class="view-grid">
                        <!-- Show/Hide Circles -->
                        <button class="icon-btn active" id="circlesToggleBtn"
                            title="Toggle Epicycles (Circles)">⭕</button>

                        <!-- Show/Hide Vectors -->
                        <button class="icon-btn active" id="vectorsToggleBtn" title="Toggle Vectors (Lines)">↗️</button>

                        <!-- Show/Hide Reference Path -->
                        <button class="icon-btn active" id="pathToggleBtn" title="Toggle Reference Path">🟡</button>

                        <!-- Minimap -->
                        <button class="icon-btn active" id="mapToggleBtn" title="Toggle Minimap">🗺️</button>

                        <!-- Rainbow Vectors -->
                        <button class="icon-btn" id="rainbowToggleBtn" title="Toggle Rainbow Vectors">🌈</button>

                        <!-- Path Fading -->
                        <button class="icon-btn active" id="pathFadingBtn" title="Toggle Path Fading">📉</button>

                        <!-- Follow -->
                        <button class="icon-btn" id="followBtn" title="Camera Follow (Smooth)">🎯</button>

                        <!-- Snap Follow -->
                        <button class="icon-btn" id="snapFollowBtn" title="Camera Snap Follow">📌</button>
                    </div>
                </div>

                <!-- Vector List -->
                <button class="icon-btn" id="vectorListBtn" title="Vector List">📊</button>
                <div class="popover" id="vectorPopover">
                    <span class="label">Vectors (by amplitude)</span>
                    <div class="vector-grid" id="vectorGrid"></div>
                </div>

                <!-- Playback Control -->
                <button class="icon-btn" id="playbackBtn" title="Playback Controls">⏯️</button>
                <div class="popover" id="playbackPopover" style="min-width: 220px;">
                    <span class="label">Playback Control</span>

                    <div style="display: flex; gap: 5px; margin-top: 5px;">
                        <button id="pauseBtn" class="action-btn"
                            style="flex: 1; background: rgba(255,255,255,0.1); color: #fff;">Pause</button>
                        <button id="eraseTraceBtn" class="action-btn"
                            style="flex: 1; background: rgba(255,255,255,0.1); color: #fff;">Erase Trace</button>
                    </div>

                    <span class="label" style="margin-top:10px">Speed: <span id="speedVal"
                            class="val-text">0.0002</span></span>
                    <input type="range" id="speedRange" min="0" max="1" step="0.0001">

                    <span class="label" style="margin-top:10px">Harmonics: <span id="harmonicsVal"
                            class="val-text">128</span></span>
                    <input type="range" id="harmonicsRange" min="0" max="1" step="0.001">

                    <span class="label" style="margin-top:10px">Progress: <span id="progressVal"
                            class="val-text">0%</span></span>
                    <input type="range" id="progressRange" min="0" max="6.283" step="0.001">
                </div>

                <!-- Export -->
                <button class="icon-btn" id="exportBtn" title="Export Coefficients">📤</button>
                <div class="popover" id="exportPopover">
                    <span class="label">Export Coefficients</span>
                    <select id="exportFormatSelect">
                        <option value="json">JSON</option>
                        <option value="csv">CSV (freq, amp, phase)</option>
                        <option value="js">JavaScript</option>
                        <option value="numpy">Python NumPy</option>
                        <option value="desmos">Desmos Formula</option>
                    </select>
                    <button id="copyExportBtn" class="action-btn" style="margin-top:10px">Copy to Clipboard</button>
                    <button id="downloadExportBtn" class="action-btn"
                        style="background: rgba(255,255,255,0.1); color: #fff; margin-top:5px">Download File</button>
                </div>

                <input type="checkbox" id="followCheck" style="display:none">
            </div>

            <!-- Toggle -->
            <button class="icon-btn" id="toggleBar" title="Toggle Toolbar">🛠️</button>
        </div>
    </div>
    <script>
        /** @type {HTMLCanvasElement} */
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        /** @type {HTMLCanvasElement} */
        const minimap = document.getElementById('minimap');
        const minictx = minimap.getContext('2d');

        const MIN_VISIBLE_SIZE = 1;

        class RenderingContext {
            constructor(canvas, ctx) {
                this.canvas = canvas;
                this.ctx = ctx;
                this.width = window.innerWidth;
                this.height = window.innerHeight;
                this.updateScale();
                this.objects = [];

                // Camera State
                this.camX = 0;
                this.camY = 0;
                this.zoom = 1.0;

                this.targetCamX = 0;
                this.targetCamY = 0;
                this.targetZoom = 1.0;

                this.lerpFactor = 0.15; // Smoothness factor

                // Interaction state
                this.isDragging = false;
                this.lastMouseX = 0;
                this.lastMouseY = 0;

                // Colors - Premium Dark Mode Palette
                this.colors = {
                    background: '#0a0a0c',
                    grid: '#1e1e24',
                    axis: '#3a3a45',
                    primary: '#4cc9f0',   // Cyan
                    secondary: '#f72585', // Pink
                    accent: '#7209b7',    // Purple
                    text: '#e0e0e6',
                    vector: '#4cc9f0c0',
                    circles: "#ffffff40",
                    path: "#ffff0080"
                };
            }

            updateScale() {
                // Unit circle (radius 1) occupies about half the smaller screen dimension
                // Diameter 2 = 0.5 * minDim => scale = minDim / 4
                this.scale = Math.min(this.width, this.height) / 4;
            }

            resize() {
                this.width = window.innerWidth;
                this.height = window.innerHeight;
                this.updateScale();
                this.canvas.width = this.width * window.devicePixelRatio;
                this.canvas.height = this.height * window.devicePixelRatio;
                this.ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

                minimap.width = 150 * window.devicePixelRatio;
                minimap.height = 150 * window.devicePixelRatio;
                minictx.setTransform(1, 0, 0, 1, 0, 0); // reset before scale
                minictx.scale(window.devicePixelRatio, window.devicePixelRatio);
            }

            toScreen(x, y) {
                const s = this.scale * this.zoom;
                return {
                    x: this.width / 2 + (x - this.camX) * s,
                    y: this.height / 2 - (y - this.camY) * s
                };
            }

            getScreenDist(worldDist) {
                return worldDist * this.scale * this.zoom;
            }

            toWorld(sx, sy) {
                const s = this.scale * this.zoom;
                return {
                    x: (sx - this.width / 2) / s + this.camX,
                    y: -(sy - this.height / 2) / s + this.camY
                };
            }

            handleInput() {
                this.canvas.addEventListener('mousedown', (e) => {
                    if (state.mode === 'draw') {
                        state.penPoints = [];
                        const worldPos = this.toWorld(e.clientX, e.clientY);
                        state.penPoints.push(worldPos);
                        state.isDrawingMode = true;
                    } else {
                        this.isDragging = true;
                        this.lastMouseX = e.clientX;
                        this.lastMouseY = e.clientY;
                    }
                });

                window.addEventListener('mousemove', (e) => {
                    if (state.mode === 'draw' && state.isDrawingMode) {
                        const worldPos = this.toWorld(e.clientX, e.clientY);
                        state.penPoints.push(worldPos);
                    } else if (this.isDragging) {
                        const dx = e.clientX - this.lastMouseX;
                        const dy = e.clientY - this.lastMouseY;

                        const s = this.scale * this.zoom;
                        this.targetCamX -= dx / s;
                        this.targetCamY += dy / s;

                        this.lastMouseX = e.clientX;
                        this.lastMouseY = e.clientY;
                    }
                });

                window.addEventListener('mouseup', () => {
                    this.isDragging = false;
                    if (state.mode === 'draw' && state.isDrawingMode) {
                        state.isDrawingMode = false;
                    }
                });

                this.canvas.addEventListener('wheel', (e) => {
                    e.preventDefault();

                    const zoomSensitivity = 0.001;
                    const factor = Math.exp(-e.deltaY * zoomSensitivity);

                    const mouseW = this.toWorld(e.clientX, e.clientY);

                    this.targetZoom *= factor;
                    this.targetZoom = Math.min(Math.max(this.targetZoom, 0.1), 1e10);

                    // After zooming, we adjust target position to keep point under mouse stationary
                    const s_new = this.scale * this.targetZoom;
                    this.targetCamX = mouseW.x - (e.clientX - this.width / 2) / s_new;
                    this.targetCamY = mouseW.y + (e.clientY - this.height / 2) / s_new;

                }, { passive: false });

                // Touch Events
                this.canvas.addEventListener('touchstart', (e) => {
                    if (e.touches.length === 1) {
                        const touch = e.touches[0];
                        if (state.mode === 'draw') {
                            e.preventDefault();
                            state.penPoints = [];
                            const worldPos = this.toWorld(touch.clientX, touch.clientY);
                            state.penPoints.push(worldPos);
                            state.isDrawingMode = true;
                        } else {
                            this.isDragging = true;
                            this.lastMouseX = touch.clientX;
                            this.lastMouseY = touch.clientY;
                        }
                    } else if (e.touches.length === 2 && state.mode !== 'draw') {
                        e.preventDefault();
                        this.isDragging = false;
                        const dx = e.touches[0].clientX - e.touches[1].clientX;
                        const dy = e.touches[0].clientY - e.touches[1].clientY;
                        this.initialPinchDistance = Math.hypot(dx, dy);
                        this.initialPinchZoom = this.targetZoom;

                        const centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                        const centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                        this.initialPinchCenterWorld = this.toWorld(centerX, centerY);
                    }
                }, { passive: false });

                window.addEventListener('touchmove', (e) => {
                    if (e.touches.length === 1) {
                        const touch = e.touches[0];
                        if (state.mode === 'draw' && state.isDrawingMode) {
                            const worldPos = this.toWorld(touch.clientX, touch.clientY);
                            state.penPoints.push(worldPos);
                        } else if (this.isDragging) {
                            const dx = touch.clientX - this.lastMouseX;
                            const dy = touch.clientY - this.lastMouseY;

                            const s = this.scale * this.zoom;
                            this.targetCamX -= dx / s;
                            this.targetCamY += dy / s;

                            this.lastMouseX = touch.clientX;
                            this.lastMouseY = touch.clientY;
                        }
                    } else if (e.touches.length === 2 && state.mode !== 'draw') {
                        e.preventDefault();
                        if (this.initialPinchDistance) {
                            const dx = e.touches[0].clientX - e.touches[1].clientX;
                            const dy = e.touches[0].clientY - e.touches[1].clientY;
                            const currentDistance = Math.hypot(dx, dy);
                            const factor = currentDistance / this.initialPinchDistance;

                            this.targetZoom = this.initialPinchZoom * factor;
                            this.targetZoom = Math.min(Math.max(this.targetZoom, 0.1), 1e10);

                            const centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                            const centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

                            const s_new = this.scale * this.targetZoom;
                            this.targetCamX = this.initialPinchCenterWorld.x - (centerX - this.width / 2) / s_new;
                            this.targetCamY = this.initialPinchCenterWorld.y + (centerY - this.height / 2) / s_new;
                        }
                    }
                }, { passive: false });

                window.addEventListener('touchend', (e) => {
                    if (state.mode === 'draw' && state.isDrawingMode && e.touches.length === 0) {
                        state.isDrawingMode = false;
                    }

                    if (e.touches.length < 2) {
                        this.initialPinchDistance = null;
                    }

                    if (e.touches.length === 1 && state.mode !== 'draw') {
                        this.isDragging = true;
                        this.lastMouseX = e.touches[0].clientX;
                        this.lastMouseY = e.touches[0].clientY;
                    } else if (e.touches.length === 0) {
                        this.isDragging = false;
                    }
                });
            }

            smooth() {
                const lerp = (a, b, f) => a + (b - a) * f;
                this.camX = lerp(this.camX, this.targetCamX, this.lerpFactor);
                this.camY = lerp(this.camY, this.targetCamY, this.lerpFactor);
                this.zoom = lerp(this.zoom, this.targetZoom, this.lerpFactor);
            }

            clear() {
                this.ctx.fillStyle = this.colors.background;
                this.ctx.fillRect(0, 0, this.width, this.height);
            }

            drawGrid() {
                const s = this.scale * this.zoom;
                const targetPixelStep = 100;
                let unitStep = targetPixelStep / s;

                const magnitude = Math.pow(10, Math.floor(Math.log10(unitStep)));
                const relStep = unitStep / magnitude;
                if (relStep < 1.5) unitStep = 1 * magnitude;
                else if (relStep < 3.5) unitStep = 2 * magnitude;
                else if (relStep < 7.5) unitStep = 5 * magnitude;
                else unitStep = 10 * magnitude;

                const pixelStep = unitStep * s;
                this.ctx.lineWidth = 1;

                // Viewport boundaries in world units
                const topLeft = this.toWorld(0, 0);
                const bottomRight = this.toWorld(this.width, this.height);

                // Align start world grid line
                const startX = Math.floor(topLeft.x / unitStep) * unitStep;
                const endX = Math.ceil(bottomRight.x / unitStep) * unitStep;
                const startY = Math.floor(bottomRight.y / unitStep) * unitStep;
                const endY = Math.ceil(topLeft.y / unitStep) * unitStep;

                for (let ux = startX; ux <= endX; ux += unitStep) {
                    const sx = this.toScreen(ux, 0).x;
                    this.ctx.strokeStyle = this.colors.grid;
                    this.ctx.beginPath();
                    this.ctx.moveTo(sx, 0);
                    this.ctx.lineTo(sx, this.height);
                    this.ctx.stroke();
                }

                for (let uy = startY; uy <= endY; uy += unitStep) {
                    const sy = this.toScreen(0, uy).y;
                    this.ctx.strokeStyle = this.colors.grid;
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, sy);
                    this.ctx.lineTo(this.width, sy);
                    this.ctx.stroke();
                }

                // Axes
                const origin = this.toScreen(0, 0);
                this.ctx.strokeStyle = this.colors.axis;
                this.ctx.lineWidth = 2;

                if (origin.y >= 0 && origin.y <= this.height) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, origin.y);
                    this.ctx.lineTo(this.width, origin.y);
                    this.ctx.stroke();
                }

                if (origin.x >= 0 && origin.x <= this.width) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(origin.x, 0);
                    this.ctx.lineTo(origin.x, this.height);
                    this.ctx.stroke();
                }
            }

            line(x1, y1, x2, y2, color, width = 0.01, checkSize = false, minWidth = 0.25) {
                const p1 = this.toScreen(x1, y1);
                const p2 = this.toScreen(x2, y2);
                if (checkSize && Math.abs(p1.x - p2.x) <= MIN_VISIBLE_SIZE && Math.abs(p1.y - p2.y) <= MIN_VISIBLE_SIZE) return false;
                const s = this.scale * this.zoom;
                this.ctx.strokeStyle = color || this.colors.primary;
                this.ctx.lineWidth = Math.max(minWidth, width * s);
                this.ctx.beginPath();
                this.ctx.moveTo(p1.x, p1.y);
                this.ctx.lineTo(p2.x, p2.y);
                this.ctx.stroke();
                return true;
            }

            circle(x, y, r, color, width = 0.01, fill = false, checkSize = false, minWidth = 0.25) {
                const s = this.scale * this.zoom;
                if (checkSize && r * s * 2 <= MIN_VISIBLE_SIZE) return false;
                const p = this.toScreen(x, y);
                this.ctx.beginPath();
                this.ctx.arc(p.x, p.y, r * s, 0, Math.PI * 2);
                if (fill) {
                    this.ctx.fillStyle = color || this.colors.primary;
                    this.ctx.fill();
                } else {
                    this.ctx.strokeStyle = color || this.colors.primary;
                    this.ctx.lineWidth = Math.max(minWidth, width * s);
                    this.ctx.stroke();
                }
                return true;
            }

            point(x, y, color, size = 0.02, checkSize = false, minWidth = 1) {
                const s = this.scale * this.zoom;
                if (checkSize && Math.max(1, size * s) * 2 <= MIN_VISIBLE_SIZE) return false;
                const p = this.toScreen(x, y);
                this.ctx.beginPath();
                this.ctx.arc(p.x, p.y, Math.max(minWidth, size * s), 0, Math.PI * 2);
                this.ctx.fillStyle = color || this.colors.primary;
                this.ctx.fill();
                return true;
            }

            // Fixed-width line for paths
            fixedLine(x1, y1, x2, y2, color, pixelWidth = 1, alpha = 1.0, checkSize = false) {
                const p1 = this.toScreen(x1, y1);
                const p2 = this.toScreen(x2, y2);
                if (checkSize && Math.abs(p1.x - p2.x) <= MIN_VISIBLE_SIZE && Math.abs(p1.y - p2.y) <= MIN_VISIBLE_SIZE) return false;
                this.ctx.save();
                this.ctx.globalAlpha = alpha;
                this.ctx.strokeStyle = color;
                this.ctx.lineWidth = pixelWidth;
                this.ctx.beginPath();
                this.ctx.moveTo(p1.x, p1.y);
                this.ctx.lineTo(p2.x, p2.y);
                this.ctx.stroke();
                this.ctx.restore();
                return true;
            }

            fixedPoint(x, y, color, pixelSize = 3, checkSize = false) {
                if (checkSize && pixelSize * 2 <= MIN_VISIBLE_SIZE) return false;
                const p = this.toScreen(x, y);
                this.ctx.beginPath();
                this.ctx.arc(p.x, p.y, pixelSize, 0, Math.PI * 2);
                this.ctx.fillStyle = color || this.colors.primary;
                this.ctx.fill();
                return true;
            }

            fixedCircle(x, y, r, color, pixelWidth = 1, checkSize = false) {
                const s = this.scale * this.zoom;
                if (checkSize && r * s * 2 <= MIN_VISIBLE_SIZE) return false;
                const p = this.toScreen(x, y);
                this.ctx.beginPath();
                this.ctx.arc(p.x, p.y, r * s, 0, Math.PI * 2);
                this.ctx.strokeStyle = color || this.colors.primary;
                this.ctx.lineWidth = pixelWidth;
                this.ctx.stroke();
                return true;
            }

            arrowhead(x, y, angle, color, headSizeWorld = 0.05) {
                const s = this.scale * this.zoom;
                if (headSizeWorld * s < 0.5) return false;

                const alpha = Math.PI / 7;
                const pTip = this.toScreen(x, y);
                const pWing1 = this.toScreen(
                    x - headSizeWorld * Math.cos(angle - alpha),
                    y - headSizeWorld * Math.sin(angle - alpha)
                );
                const pWing2 = this.toScreen(
                    x - headSizeWorld * Math.cos(angle + alpha),
                    y - headSizeWorld * Math.sin(angle + alpha)
                );

                this.ctx.save();
                this.ctx.fillStyle = color || this.colors.primary;
                this.ctx.beginPath();
                this.ctx.moveTo(pTip.x, pTip.y);
                this.ctx.lineTo(pWing1.x, pWing1.y);
                this.ctx.lineTo(pWing2.x, pWing2.y);
                this.ctx.closePath();
                this.ctx.fill();
                this.ctx.restore();
                return true;
            }

            fixedPath(points, color, pixelWidth = 1, alpha = 1.0, isClosed = false) {
                if (!points || points.length < 2) return;
                this.ctx.save();
                this.ctx.globalAlpha = alpha;
                this.ctx.strokeStyle = color;
                this.ctx.lineWidth = pixelWidth;
                this.ctx.beginPath();

                const getX = (p) => p.x !== undefined ? p.x : p.re;
                const getY = (p) => p.y !== undefined ? p.y : p.im;

                let p = this.toScreen(getX(points[0]), getY(points[0]));
                this.ctx.moveTo(p.x, p.y);

                let accumulatedDistance = 0;
                let prevP = p;
                for (let i = 1; i < points.length; i++) {
                    p = this.toScreen(getX(points[i]), getY(points[i]));
                    const dx = p.x - prevP.x;
                    const dy = p.y - prevP.y;
                    accumulatedDistance += dx * dx + dy * dy;
                    // Auto-simplify path by skipping points that are too close
                    if (accumulatedDistance > 0.0625 || i === points.length - 1) { // 0.25
                        this.ctx.lineTo(p.x, p.y);
                        accumulatedDistance = 0;
                    }
                    prevP = p;
                }
                if (isClosed) this.ctx.closePath();
                this.ctx.stroke();
                this.ctx.restore();
            }

            fadingPath(points, color, pixelWidth = 1, maxLen = 1000) {
                if (!points || points.length < 2) return;
                this.ctx.save();
                this.ctx.strokeStyle = color;
                this.ctx.lineWidth = pixelWidth;

                const chunks = 25; // 25 stroke calls is very fast and looks perfectly smooth
                const chunkSize = Math.max(1, Math.ceil(points.length / chunks));

                const getX = (p) => p.x !== undefined ? p.x : p.re;
                const getY = (p) => p.y !== undefined ? p.y : p.im;

                for (let c = 0; c < chunks; c++) {
                    const startIdx = c * chunkSize;
                    if (startIdx >= points.length - 1) break;
                    const endIdx = Math.min(points.length, startIdx + chunkSize + 1);

                    this.ctx.globalAlpha = 0.8 * Math.max(0, 1.0 - (startIdx / maxLen));
                    this.ctx.beginPath();
                    let p = this.toScreen(getX(points[startIdx]), getY(points[startIdx]));
                    let accumulatedDistance = 0;
                    let prevP = p;
                    this.ctx.moveTo(p.x, p.y);
                    for (let i = startIdx + 1; i < endIdx; i++) {
                        p = this.toScreen(getX(points[i]), getY(points[i]));
                        const dx = p.x - prevP.x;
                        const dy = p.y - prevP.y;
                        accumulatedDistance += dx * dx + dy * dy;
                        // Auto-simplify path by skipping points that are too close
                        if (accumulatedDistance > 0.0625 || i === points.length - 1) { // 0.25
                            this.ctx.lineTo(p.x, p.y);
                            accumulatedDistance = 0;
                        }
                        prevP = p;
                    }
                    this.ctx.stroke();
                }
                this.ctx.restore();
            }
        }

        function miniFFT(re, im) {
            var N = re.length;
            for (var i = 0; i < N; i++) {
                for (var j = 0, h = i, k = N; k >>= 1; h >>= 1)
                    j = (j << 1) | (h & 1);
                if (j > i) {
                    re[j] = [re[i], re[i] = re[j]][0]
                    im[j] = [im[i], im[i] = im[j]][0]
                }
            }
            for (var hN = 1; hN * 2 <= N; hN *= 2)
                for (var i = 0; i < N; i += hN * 2)
                    for (var j = i; j < i + hN; j++) {
                        var cos = Math.cos(Math.PI * (j - i) / hN),
                            sin = Math.sin(Math.PI * (j - i) / hN)
                        var tre = re[j + hN] * cos + im[j + hN] * sin,
                            tim = -re[j + hN] * sin + im[j + hN] * cos;
                        re[j + hN] = re[j] - tre; im[j + hN] = im[j] - tim;
                        re[j] += tre; im[j] += tim;
                    }
        }

        /**
         * Custom FFT using miniFFT
         */
        function computeFFT(x) {
            const N = x.length;
            const re = x.map(p => p.re);
            const im = x.map(p => p.im);
            miniFFT(re, im);
            const X = [];
            for (let k = 0; k < N; k++) {
                const r = re[k] / N;
                const i = im[k] / N;
                const freq = k <= N / 2 ? k : k - N;
                const amp = Math.sqrt(r * r + i * i);
                const phase = Math.atan2(i, r);
                X.push({ freq, amp, phase });
            }
            return X;
        }

        /**
         * Resample points to the nearest power of 2
         */
        function resamplePath(points) {
            if (points.length < 2) return [];

            // Calculate current path length
            let totalDist = 0;
            const dists = [0];
            for (let i = 1; i < points.length; i++) {
                const d = Math.sqrt(Math.pow(points[i].x - points[i - 1].x, 2) + Math.pow(points[i].y - points[i - 1].y, 2));
                totalDist += d;
                dists.push(totalDist);
            }

            // Target count: nearest power of 2, minimum 256
            const targetCount = Math.max(256, Math.pow(2, Math.round(Math.log2(points.length))));
            const resampled = [];

            for (let i = 0; i < targetCount; i++) {
                const targetDist = (i / targetCount) * totalDist;

                // Find segment
                let low = 0, high = dists.length - 1;
                while (low < high) {
                    let mid = (low + high) >> 1;
                    if (dists[mid] < targetDist) low = mid + 1;
                    else high = mid;
                }
                const index = low;

                if (index === 0) {
                    resampled.push({ re: points[0].x, im: points[0].y });
                } else {
                    const p1 = points[index - 1];
                    const p2 = points[index];
                    const t = (targetDist - dists[index - 1]) / (dists[index] - dists[index - 1]);
                    resampled.push({
                        re: p1.x + (p2.x - p1.x) * t,
                        im: p1.y + (p2.y - p1.y) * t
                    });
                }
            }
            return resampled;
        }

                    }
                    // Top to center
                    pts.push({ x: 0, y: r });
                    pts.push({ x: 0, y: 0 });
                    // Center to bottom-left
                    pts.push({ x: r * Math.cos(225 * Math.PI / 180), y: r * Math.sin(225 * Math.PI / 180) });
                    // Bottom-left to center
                    pts.push({ x: 0, y: 0 });
                    // Center to bottom-right
                    pts.push({ x: r * Math.cos(315 * Math.PI / 180), y: r * Math.sin(315 * Math.PI / 180) });
                    // Bottom-right to center
                    pts.push({ x: 0, y: 0 });
                    // Center to bottom
                    pts.push({ x: 0, y: -r });
                    // Bottom to center
                    pts.push({ x: 0, y: 0 });
                    // Center to top
                    pts.push({ x: 0, y: r });
                    pts.push({ ...pts[0] });
                    return pts;
                }
            },
            ankh: {
                name: 'Ankh',
                func: (size) => {
                    const pts = [];
                    const s = size * 1.5;
                    const w = s * 0.15;
                    // Loop part
                    for (let t = -Math.PI / 2; t <= 3 * Math.PI / 2; t += 0.2) {
                        pts.push({ x: (s * 0.3) * Math.cos(t), y: (s * 0.4) * Math.sin(t) + s * 0.5 });
                    }
                    // Vertical stem
                    pts.push({ x: -w, y: s * 0.1 });
                    pts.push({ x: -w, y: -s });
                    pts.push({ x: w, y: -s });
                    pts.push({ x: w, y: s * 0.1 });
                    // Horizontal arms
                    pts.push({ x: s * 0.6, y: s * 0.1 });
                    pts.push({ x: s * 0.6, y: -w });
                    pts.push({ x: -s * 0.6, y: -w });
                    pts.push({ x: -s * 0.6, y: s * 0.1 });
                    pts.push({ ...pts[0] });
                    return pts;
                }
            },
            trefoil: {
                name: 'Trefoil Knot',
                func: (size) => {
                    const pts = [];
                    const s = size * 0.8;
                    for (let t = 0; t < Math.PI * 2; t += 0.05) {
                        const x = (2 + Math.cos(3 * t)) * Math.cos(2 * t);
                        const y = (2 + Math.cos(3 * t)) * Math.sin(2 * t);
                        pts.push({ x: x * s, y: y * s });
                    }
                    pts.push({ ...pts[0] });
                    return pts;
                }
            },
            radiation: {
                name: 'Radiation',
                func: (size) => {
                    const pts = [];
                    const r = size * 1.5;
                    const r0 = r * 0.22;
                    // Center circle
                    for (let t = 0; t <= Math.PI * 2.1; t += 0.2) {
                        pts.push({ x: r0 * Math.cos(t), y: r0 * Math.sin(t) });
                    }
                    // Three vanes
                    for (let i = 0; i < 3; i++) {
                        const ang = i * Math.PI * 2 / 3 + Math.PI / 6;
                        const rotate = (p) => ({
                            x: p.x * Math.cos(ang) - p.y * Math.sin(ang),
                            y: p.x * Math.sin(ang) + p.y * Math.cos(ang)
                        });

                        pts.push(rotate({ x: r0, y: 0 }));
                        pts.push(rotate({ x: r, y: 0 }));
                        for (let t = 0; t <= Math.PI / 3; t += 0.1) {
                            pts.push(rotate({ x: r * Math.cos(t), y: r * Math.sin(t) }));
                        }
                        pts.push(rotate({ x: r0 * Math.cos(Math.PI / 3), y: r0 * Math.sin(Math.PI / 3) }));
                        // Arc along r0 to the next vane's start position (roundabout)
                        for (let t = Math.PI / 3; t <= Math.PI * 2 / 3; t += 0.1) {
                            pts.push(rotate({ x: r0 * Math.cos(t), y: r0 * Math.sin(t) }));
                        }
                    }
                    pts.push({ ...pts[0] });
                    return pts;
                }
            }
        };

        function updateFFT(newPath) {
            if (!newPath || newPath.length < 2) return;

            // Normalize path: center and scale to roughly fit unit view
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            newPath.forEach(p => {
                minX = Math.min(minX, p.re); maxX = Math.max(maxX, p.re);
                minY = Math.min(minY, p.im); maxY = Math.max(maxY, p.im);
            });
            const cx = (minX + maxX) / 2;
            const cy = (minY + maxY) / 2;
            const size = Math.max(maxX - minX, maxY - minY);
            const scale = 2.0 / (size || 1); // target fits in [-1.0, 1.0] roughly

            newPath.forEach(p => {
                p.re = (p.re - cx) * scale;
                p.im = (p.im - cy) * scale;
            });

            pathData.length = 0;
            newPath.forEach(p => pathData.push(p));
            fourier = computeFFT(pathData);
            fourier.sort((a, b) => b.amp - a.amp);
            fourier = fourier.filter(v => v.amp > 1e-10);


            const maxAmpLog = fourier.length > 0 ? Math.log(fourier[0].amp) : 0;
            const minAmpLog = fourier.length > 0 ? Math.log(fourier[fourier.length - 1].amp) : 0;

            fourier.forEach(v => {
                // Color: blue-to-gray by relative amplitude
                const t = Math.min((Math.log(v.amp) - minAmpLog) / (maxAmpLog - minAmpLog), 1);
                v.color = `rgb(${getColor(VECTOR_PALETTE, t).join(',')})`;
                v.colorTrans = `rgb(${getColor(VECTOR_PALETTE, t).join(',')}, 0.75)`;
            });

            // Update range max
            const range = document.getElementById('harmonicsRange');
            range.value = 0.5;
            document.getElementById('harmonicsVal').innerText = state.harmonics;

            // Update progress range
            const progressRange = document.getElementById('progressRange');
            progressRange.value = 0;
            updateProgressText(0);

            state.time = 0;
            state.tracedPath = [];

            // Trigger slider update to reflect new max harmonics
            updateHarmonicsFromSlider();
        }

        function processImageToPath(img) {
            const MAX_DIM = 1000;
            let w = img.width;
            let h = img.height;
            if (w > MAX_DIM || h > MAX_DIM) {
                const ratio = Math.min(MAX_DIM / w, MAX_DIM / h);
                w = Math.floor(w * ratio);
                h = Math.floor(h * ratio);
            }

            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, w, h);
            ctx.drawImage(img, 0, 0, w, h);

            const imgData = ctx.getImageData(0, 0, w, h);
            const data = imgData.data;

            const gray = new Float32Array(w * h);
            for (let i = 0; i < data.length; i += 4) {
                gray[i >> 2] = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
            }

            const mag = new Float32Array(w * h);
            const dir = new Float32Array(w * h);
            let maxMag = 0;

            const getP = (x, y) => {
                if (x < 0) x = 0; if (x >= w) x = w - 1;
                if (y < 0) y = 0; if (y >= h) y = h - 1;
                return gray[y * w + x];
            };

            for (let y = 1; y < h - 1; y++) {
                for (let x = 1; x < w - 1; x++) {
                    const gx = -getP(x - 1, y - 1) + getP(x + 1, y - 1)
                        - 2 * getP(x - 1, y) + 2 * getP(x + 1, y)
                        - getP(x - 1, y + 1) + getP(x + 1, y + 1);
                    const gy = -getP(x - 1, y - 1) - 2 * getP(x, y - 1) - getP(x + 1, y - 1)
                        + getP(x - 1, y + 1) + 2 * getP(x, y + 1) + getP(x + 1, y + 1);
                    const val = Math.sqrt(gx * gx + gy * gy);
                    mag[y * w + x] = val;
                    dir[y * w + x] = Math.atan2(gy, gx);
                    if (val > maxMag) maxMag = val;
                }
            }

            const nms = new Float32Array(w * h);
            let maxNms = 0;
            for (let y = 1; y < h - 1; y++) {
                for (let x = 1; x < w - 1; x++) {
                    const m = mag[y * w + x];
                    if (m === 0) continue;
                    let angle = dir[y * w + x] * (180 / Math.PI);
                    if (angle < 0) angle += 180;

                    let q = 255, r = 255;
                    if ((0 <= angle && angle < 22.5) || (157.5 <= angle && angle <= 180)) {
                        q = mag[y * w + (x + 1)]; r = mag[y * w + (x - 1)];
                    } else if (22.5 <= angle && angle < 67.5) {
                        q = mag[(y + 1) * w + (x + 1)]; r = mag[(y - 1) * w + (x - 1)];
                    } else if (67.5 <= angle && angle < 112.5) {
                        q = mag[(y + 1) * w + x]; r = mag[(y - 1) * w + x];
                    } else if (112.5 <= angle && angle < 157.5) {
                        q = mag[(y - 1) * w + (x + 1)]; r = mag[(y + 1) * w + (x - 1)];
                    }

                    if (m >= q && m >= r) {
                        nms[y * w + x] = m;
                        if (m > maxNms) maxNms = m;
                    }
                }
            }

            let points = [];
            const threshold = maxNms * imgConfig.cannyThresh;
            for (let y = 1; y < h - 1; y++) {
                for (let x = 1; x < w - 1; x++) {
                    if (nms[y * w + x] > threshold) {
                        points.push({ x: x - w / 2, y: -(y - h / 2) });
                    }
                }
            }

            if (points.length === 0) return [];

            const MAX_POINTS = Math.pow(2, imgConfig.maxPointsExp);
            if (points.length > MAX_POINTS) {
                const sampled = [];
                const step = points.length / MAX_POINTS;
                for (let i = 0; i < MAX_POINTS; i++) {
                    sampled.push(points[Math.floor(i * step)]);
                }
                points = sampled;
            }

            const path = [];
            const visited = new Uint8Array(points.length);

            let currIdx = 0;
            path.push(points[currIdx]);
            visited[currIdx] = 1;

            for (let step = 1; step < points.length; step++) {
                let bestDist = Infinity;
                let bestIdx = -1;
                const p1 = points[currIdx];

                for (let i = 0; i < points.length; i++) {
                    if (visited[i] === 0) {
                        const p2 = points[i];
                        const dx = p1.x - p2.x;
                        const dy = p1.y - p2.y;
                        const distSq = dx * dx + dy * dy;
                        if (distSq < bestDist) {
                            bestDist = distSq;
                            bestIdx = i;
                        }
                    }
                }

                if (bestIdx !== -1) {
                    currIdx = bestIdx;
                    path.push(points[currIdx]);
                    visited[currIdx] = 1;
                } else {
                    break;
                }
            }

            if (path.length < 2) return [];

            // Smooth path to remove pixel staircasing
            const SMOOTH_PASSES = imgConfig.smoothPasses;
            const WINDOW = imgConfig.smoothWindow;
            for (let pass = 0; pass < SMOOTH_PASSES; pass++) {
                const temp = new Array(path.length);
                for (let i = 0; i < path.length; i++) {
                    let sx = 0, sy = 0, count = 0;
                    for (let j = -WINDOW; j <= WINDOW; j++) {
                        let idx = i + j;
                        if (idx < 0) idx = 0;
                        if (idx >= path.length) idx = path.length - 1;
                        sx += path[idx].x;
                        sy += path[idx].y;
                        count++;
                    }
                    temp[i] = { x: sx / count, y: sy / count };
                }
                for (let i = 0; i < path.length; i++) {
                    path[i] = temp[i];
                }
            }

            const curvatures = new Float32Array(path.length);
            const STEP = Math.max(1, Math.min(3, Math.floor(path.length / 10)));
            for (let i = 1; i < path.length - 1; i++) {
                const prev = Math.max(0, i - STEP);
                const next = Math.min(path.length - 1, i + STEP);
                const dx1 = path[i].x - path[prev].x;
                const dy1 = path[i].y - path[prev].y;
                const dx2 = path[next].x - path[i].x;
                const dy2 = path[next].y - path[i].y;
                const d1 = Math.sqrt(dx1 * dx1 + dy1 * dy1);
                const d2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
                if (d1 === 0 || d2 === 0) continue;
                let a1 = Math.atan2(dy1, dx1);
                let a2 = Math.atan2(dy2, dx2);
                let diff = Math.abs(a2 - a1);
                while (diff > Math.PI) diff -= 2 * Math.PI;
                curvatures[i] = Math.abs(diff);
            }
            if (path.length > 2) {
                curvatures[0] = curvatures[1];
                curvatures[path.length - 1] = curvatures[path.length - 2];
            }

            let totalWeight = 0;
            const weights = [0];
            for (let i = 1; i < path.length; i++) {
                const dx = path[i].x - path[i - 1].x;
                const dy = path[i].y - path[i - 1].y;
                const d = Math.sqrt(dx * dx + dy * dy);
                const curv = Math.max(curvatures[i - 1], curvatures[i]);
                // adaptive weight based on distance and curvature
                const weight = d * (1 + imgConfig.curvWeight * curv);
                totalWeight += weight;
                weights.push(totalWeight);
            }

            const targetCount = Math.pow(2, imgConfig.maxPointsExp);
            const resampled = [];

            for (let i = 0; i < targetCount; i++) {
                const targetW = (i / targetCount) * totalWeight;

                let low = 0, high = weights.length - 1;
                while (low < high) {
                    let mid = (low + high) >> 1;
                    if (weights[mid] < targetW) low = mid + 1;
                    else high = mid;
                }
                const index = Math.max(1, low);

                const p1 = path[index - 1];
                const p2 = path[index];
                const wDiff = weights[index] - weights[index - 1];
                const t = wDiff > 1e-6 ? (targetW - weights[index - 1]) / wDiff : 0;
                resampled.push({
                    re: p1.x + (p2.x - p1.x) * t,
                    im: p1.y + (p2.y - p1.y) * t
                });
            }

            return resampled;
        }

        function sampleSVGPath(d, targetCount = 1024) {
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', d);
            const len = path.getTotalLength();
            const points = [];
            const count = Math.max(1024, targetCount);
            for (let i = 0; i < count; i++) {
                const p = path.getPointAtLength((i / count) * len);
                points.push({ x: p.x, y: -p.y });
            }
            return resamplePath(points);
        }

        function getExportString(format) {
            if (!fourier || fourier.length === 0) return "";

            // Limit to current harmonics
            const hCount = state.harmonics || fourier.length;
            const data = fourier.slice(0, hCount);

            const fn = (v) => {
                if (v === 0) return "0";
                const val = Number(v.toPrecision(5));
                const s1 = val.toString(); // standard / scientific based on JS rules
                const s1_clean = s1.replace(/e([+-]\d+)/, "e$1"); // ensure e-5 not e-05 for simplicity
                const s2 = val.toExponential().replace(/\.?0+(?=e)/, ""); // explicitly scientific
                return s1_clean.length <= s2.length ? s1_clean : s2;
            };

            switch (format) {
                case 'json':
                    return JSON.stringify(data.map(d => ({
                        f: d.freq,
                        a: Number(fn(d.amp)),
                        p: Number(fn(d.phase))
                    })), null, 2);
                case 'csv':
                    let csv = "freq,amp,phase\n";
                    data.forEach(d => { csv += `${d.freq},${fn(d.amp)},${fn(d.phase)}\n`; });
                    return csv;
                case 'js':
                    let js = "const coeffs = [\n";
                    data.forEach(d => { js += `  [${d.freq}, ${fn(d.amp)}, ${fn(d.phase)}],\n`; });
                    js += "];\n\n";
                    js += "/**\n * Get a point at time t (0 to 1)\n */\n";
                    js += "function getPoint(t) {\n";
                    js += "  let x = 0, y = 0;\n";
                    js += "  const twoPi = 2 * Math.PI;\n";
                    js += "  for (const [f, amp, phase] of coeffs) {\n";
                    js += "    const angle = f * twoPi * t + phase;\n";
                    js += "    x += amp * Math.cos(angle);\n";
                    js += "    y += amp * Math.sin(angle);\n";
                    js += "  }\n";
                    js += "  return { x, y };\n";
                    js += "}\n";
                    return js;
                case 'numpy':
                    let py = "import numpy as np\n\n";
                    py += "coeffs = np.array([\n";
                    data.forEach(d => { py += `    [${d.freq}, ${fn(d.amp)}, ${fn(d.phase)}],\n`; });
                    py += "])\n\n";
                    py += "def get_path(t):\n";
                    py += "    \"\"\"Get points at time t (can be an array)\"\"\"\n";
                    py += "    # t: (M,), f: (N, 1), p: (N, 1)\n";
                    py += "    f = coeffs[:, 0, np.newaxis]\n";
                    py += "    a = coeffs[:, 1, np.newaxis]\n";
                    py += "    p = coeffs[:, 2, np.newaxis]\n";
                    py += "    angles = f * 2 * np.pi * t + p\n";
                    py += "    x = np.sum(a * np.cos(angles), axis=0)\n";
                    py += "    y = np.sum(a * np.sin(angles), axis=0)\n";
                    py += "    return x, y\n";
                    return py;
                case 'desmos':
                    const dfn = (v) => fn(v).replace(/e([+-]\d+)/, "*10^{$1}");
                    const xTerms = data.map(d => `${dfn(d.amp)}cos(${d.freq} * 2\\pi * t + ${dfn(d.phase)})`).join(" + ");
                    const yTerms = data.map(d => `${dfn(d.amp)}sin(${d.freq} * 2\\pi * t + ${dfn(d.phase)})`).join(" + ");
                    return `( ${xTerms}, ${yTerms} )`;
                default: return "";
            }
        }

                        ext = 'py';
                        break;
                    case 'desmos':
                        ext = 'txt';
                        break;
                }
                a.href = url;
                a.download = `fourier_coeffs.${ext}`;
                a.click();
                URL.revokeObjectURL(url);
            });

            const pauseBtn = document.getElementById('pauseBtn');
            pauseBtn.addEventListener('click', () => {
                state.paused = !state.paused;
                pauseBtn.innerText = state.paused ? "Resume" : "Pause";
                pauseBtn.style.background = state.paused ? "#4cc9f0" : "rgba(255,255,255,0.1)";
                pauseBtn.style.color = state.paused ? "#000" : "#fff";
                pauseBtn.style.boxShadow = state.paused ? "0 0 10px #4cc9f0" : "none";

            document.getElementById('eraseTraceBtn').addEventListener('click', () => {

            const initialT = 0.5;
            document.getElementById('speedRange').value = initialT;

            const followBtn = document.getElementById('followBtn');

            function updateFollowState(follow) {
                state.follow = follow;

            }

            snapFollowBtn.addEventListener('click', () => {
                state.snapFollow = !state.snapFollow;

            const circlesToggleBtn = document.getElementById('circlesToggleBtn');
            circlesToggleBtn.addEventListener('click', () => {

            const vectorsToggleBtn = document.getElementById('vectorsToggleBtn');

            const rainbowToggleBtn = document.getElementById('rainbowToggleBtn');
            rainbowToggleBtn.addEventListener('click', () => {

            const pathFadingBtn = document.getElementById('pathFadingBtn');
            pathFadingBtn.addEventListener('click', () => {

            pathToggleBtn.addEventListener('click', () => {

            const mapToggleBtn = document.getElementById('mapToggleBtn');
            mapToggleBtn.addEventListener('click', () => {
                state.showMap = !state.showMap;
                mapToggleBtn.classList.toggle('active', state.showMap);

            });



            document.getElementById('presetSelect').addEventListener('change', (e) => {
                const path = generatePreset(e.target.value);
                updateFFT(path);
            });

            document.getElementById('penBtn').addEventListener('click', (e) => {
                if (state.mode === 'animate') {
                    state.mode = 'draw';
                    state.penPoints = [];

                    e.target.title = 'Finish Drawing';
                } else {
                    state.mode = 'animate';
                    e.target.classList.remove('active');
                    e.target.title = 'Draw Path';

                    }

            });

            // SVG or Image Upload
            document.getElementById('svgBtnFile').addEventListener('click', () => {
                document.getElementById('svgInput').click();
            });

            const reprocessImage = () => {
                if (currentImage) {
                    const path = processImageToPath(currentImage);
                    if (path && path.length >= 2) {
                        updateFFT(path);
                    }
                }
            };

            const bindSlider = (id, valId, configKey, displayFormat, transformVal) => {
                const el = document.getElementById(id);
                const valEl = document.getElementById(valId);
                el.addEventListener('input', (e) => {
                    const v = parseFloat(e.target.value);
                    imgConfig[configKey] = transformVal ? transformVal(v) : v;
                    valEl.innerText = displayFormat ? displayFormat(v) : v;
                    // No real-time reprocessing
                });
            };

            document.getElementById('svgBtnApply').addEventListener('click', () => {
                reprocessImage();
            });

            bindSlider('maxPtsRange', 'maxPtsVal', 'maxPointsExp', v => Math.pow(2, v));
            bindSlider('cannyRange', 'cannyVal', 'cannyThresh', v => v, v => v / 100);
            bindSlider('smoothPRange', 'smoothPVal', 'smoothPasses');
            bindSlider('smoothWRange', 'smoothWVal', 'smoothWindow');
            bindSlider('curvWRange', 'curvWVal', 'curvWeight');

            document.getElementById('svgInput').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (file.type.startsWith('image/') && file.type !== 'image/svg+xml') {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            currentImage = img;
                            reprocessImage();
                            document.getElementById('svgPopover').classList.remove('active');
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                    return;
                }

                const reader = new FileReader();
                reader.onload = (event) => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(event.target.result, 'image/svg+xml');
                    const paths = Array.from(doc.querySelectorAll('path'));
                    if (paths.length > 0) {
                        const d = paths.map(p => p.getAttribute('d')).join(' ');
                        const sample = sampleSVGPath(d);
                        currentImage = null; // Unset image reference for SVG
                        updateFFT(sample);
                        document.getElementById('svgPopover').classList.remove('active');
                    }
                };
                reader.readAsText(file);
            });

            // Text Render
            document.getElementById('textBtnRender').addEventListener('click', async () => {
                const btn = document.getElementById('textBtnRender');
                const text = document.getElementById('textInput').value;
                if (text) {
                    const originalText = btn.textContent;
                    btn.textContent = 'Loading...';
                    btn.disabled = true;
                    try {
                        const sample = await renderTextToPath(text);

                            updateFFT(sample);
                            document.getElementById('textPopover').classList.remove('active');
